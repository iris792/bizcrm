// 代理商用：樹狀結構 類別 > 細項 > 原廠品牌 可複選
function buildVendorBrandPicker(savedBrands) {
  // Build tree: cat → sub → [{ vendorId, vendorName }]
  const tree = {}; // { catKey: { label, icon, subs: { sub: [ {id, name} ] } } }

  DB_VENDORS.list.forEach(v => {
    const vendorName = v.nameZh || v.nameEn || '';
    v.products.forEach(p => {
      if (!p.cat || !p.sub) return;
      if (!tree[p.cat]) tree[p.cat] = { label: PROD_CATS[p.cat]?.label||p.cat, icon: PROD_CATS[p.cat]?.icon||'', subs: {} };
      if (!tree[p.cat].subs[p.sub]) tree[p.cat].subs[p.sub] = [];
      // Avoid duplicate vendor per sub
      if (!tree[p.cat].subs[p.sub].find(x=>x.id===v.id)) {
        tree[p.cat].subs[p.sub].push({ id: v.id, name: vendorName });
      }
    });
  });

  if (!Object.keys(tree).length) {
    return '<div style="color:var(--text3);font-size:13px;">尚無產品資料，請先至「產品資訊」建立原廠</div>';
  }

  // saved brands set: "vendorId|sub"
  const savedSet = new Set((savedBrands||[]).filter(b=>b._dealerKey).map(b=>b._dealerKey));

  let html = '<div class="dealer-tree">';
  Object.entries(tree).forEach(([catKey, cat]) => {
    html += '<div class="dealer-cat">';
    html += '<div class="dealer-cat-label">' + cat.icon + ' ' + cat.label + '</div>';
    Object.entries(cat.subs).forEach(([sub, vendors]) => {
      if (!vendors.length) return;
      html += '<div class="dealer-sub">';
      html += '<div class="dealer-sub-label">' + sub + '</div>';
      html += '<div class="dealer-brands">';
      vendors.forEach(v => {
        const key = v.id + '|' + sub;
        const sel = savedSet.has(key);
        html += '<label class="brand-chip ' + (sel?'selected':'') + '" data-dealer-key="' + key + '" onclick="toggleDealerChip(this)">' +
          '<span class="chip-check"></span>' + v.name + '</label>';
      });
      html += '</div></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function toggleDealerChip(lbl) {
  lbl.classList.toggle('selected');
}

function getSelectedBrands() {
  // Dealer tree mode
  const dealerChips = document.querySelectorAll('.brand-chip[data-dealer-key]');
  if (dealerChips.length) {
    const result = [];
    dealerChips.forEach(chip => {
      if (!chip.classList.contains('selected')) return;
      const key = chip.dataset.dealerKey; // "vendorId|sub"
      const [vidStr, sub] = key.split('|');
      const vid = parseInt(vidStr);
      const v = DB_VENDORS.list.find(x=>x.id===vid);
      if (v) result.push({ _dealerKey: key, catKey:'', catLabel: v.nameZh||v.nameEn, subcat: sub, brand: v.nameZh||v.nameEn });
    });
    return result;
  }
  // Vendor brand chip mode (原廠/其他)
  const vendorChips = document.querySelectorAll('.brand-chip[data-vendor-id]');
  if (vendorChips.length) {
    const result = [];
    vendorChips.forEach(chip => {
      if (!chip.classList.contains('selected')) return;
      const vid = parseInt(chip.dataset.vendorId);
      const v = DB_VENDORS.list.find(x=>x.id===vid);
      if (v) result.push({ _vendorId: vid, catKey:'', catLabel: v.nameZh||v.nameEn, subcat:'', brand: v.nameZh||v.nameEn });
    });
    return result;
  }
  // Product picker mode
  const chips = document.querySelectorAll('.brand-chip.selected[data-brand]');
  return [...chips].map(el => ({
    catKey:   el.dataset.cat||'',
    catLabel: el.dataset.catlabel||'',
    subcat:   el.dataset.subcat||'',
    brand:    el.dataset.brand||'',
  }));
}

// Build product picker from DB_VENDORS data, filtered by vendorId or '' for all
function buildVendorProductPicker(savedBrands, vendorId) {
  const saved = new Set((savedBrands||[]).map(b => `${b.catLabel}||${b.subcat}||${b.brand}`));
  const grouped = {};

  DB_VENDORS.list.forEach(v => {
    if (vendorId && v.id !== vendorId) return;
    v.products.forEach(p => {
      if (!p.cat || !p.sub) return;
      if (!grouped[p.cat]) grouped[p.cat] = { label: PROD_CATS[p.cat]?.label||p.cat, icon: PROD_CATS[p.cat]?.icon||'', subcats:{} };
      if (!grouped[p.cat].subcats[p.sub]) grouped[p.cat].subcats[p.sub] = new Set();
      if (p.productName) grouped[p.cat].subcats[p.sub].add(p.productName);
    });
  });

  // Fallback to PROD_CATS presets if no vendor data
  if (!Object.keys(grouped).length) {
    Object.entries(PROD_CATS).forEach(([catKey, cat]) => {
      const subs = [...cat.subs, ...(_extraSubs[catKey]||[])];
      if (!subs.length) return;
      grouped[catKey] = { label: cat.label, icon: cat.icon, subcats:{} };
      subs.forEach(s => { grouped[catKey].subcats[s] = new Set(); });
    });
  }

  if (!Object.keys(grouped).length) return '<div style="color:var(--text3);font-size:13px;">尚無產品資料，請先至「產品資訊」建立原廠</div>';

  let html = '<div class="prod-picker" id="pp-root">';
  Object.entries(grouped).forEach(([catKey, cat]) => {
    const catSaved = (savedBrands||[]).filter(b=>b.catKey===catKey).length;
    const autoOpen = catSaved > 0;
    html += `
      <div class="prod-cat-head" onclick="toggleProdCat('pc-${catKey}')">
        <span><span class="prod-cat-icon">${cat.icon}</span> ${cat.label}${catSaved?` <span style="color:var(--accent);font-size:11px;margin-left:4px;">${catSaved} 已選</span>`:''}</span>
        <span class="prod-cat-arrow ${autoOpen?'open':''}" id="arr-${catKey}">▶</span>
      </div>
      <div class="prod-cat-body ${autoOpen?'open':''}" id="pc-${catKey}">`;
    Object.entries(cat.subcats).forEach(([sub, names]) => {
      html += `<div class="prod-subcat"><div class="prod-subcat-label">${sub}</div><div class="brand-chips">`;
      const key = `${cat.label}||${sub}||${sub}`;
      const sel = saved.has(key);
      html += `<span class="brand-chip ${sel?'selected':''}" data-cat="${catKey}" data-catlabel="${cat.label}" data-subcat="${sub}" data-brand="${sub}" onclick="toggleBrandChip(this)"><span class="chip-check"></span>${sub}</span>`;
      [...names].filter(Boolean).forEach(pname => {
        const pkey = `${cat.label}||${sub}||${pname}`;
        const psel = saved.has(pkey);
        html += `<span class="brand-chip ${psel?'selected':''}" data-cat="${catKey}" data-catlabel="${cat.label}" data-subcat="${sub}" data-brand="${pname}" onclick="toggleBrandChip(this)"><span class="chip-check"></span>${pname}</span>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  html += '</div>';
  return html;
}

// Flat brand list: { catKey, catLabel, subcat, brand }
function getAllBrands() {
  const result = [];
  Object.entries(PRODUCTS).forEach(([catKey, cat]) => {
    if (!Object.keys(cat.items).length) return;
    Object.entries(cat.items).forEach(([subcat, brandsStr]) => {
      if (!brandsStr) return;
      brandsStr.split('、').forEach(b => {
        result.push({ catKey, catLabel: cat.label, subcat, brand: b.trim() });
      });
    });
  });
  return result;
}

function buildProductPicker(savedBrands) {
  // savedBrands: array of { catKey, catLabel, subcat, brand }
  const saved = new Set((savedBrands||[]).map(b => b.catLabel+'||'+b.subcat+'||'+b.brand));

  // Group allBrands by catKey > subcat
  const grouped = {};
  getAllBrands().forEach(b => {
    if (!grouped[b.catKey]) grouped[b.catKey] = { label: b.catLabel, icon: PRODUCTS[b.catKey].icon, subcats: {} };
    if (!grouped[b.catKey].subcats[b.subcat]) grouped[b.catKey].subcats[b.subcat] = [];
    grouped[b.catKey].subcats[b.subcat].push(b);
  });

  let html = '<div class="prod-picker" id="pp-root">';
  Object.entries(grouped).forEach(([catKey, cat]) => {
    const catSavedCount = (savedBrands||[]).filter(b=>b.catKey===catKey).length;
    html += `
      <div class="prod-cat-head" onclick="toggleProdCat('pc-${catKey}')">
        <span><span class="prod-cat-icon">${cat.icon}</span> ${cat.label} ${catSavedCount?`<span style="color:var(--accent);font-size:11px;margin-left:4px;">${catSavedCount} 已選</span>`:''}</span>
        <span class="prod-cat-arrow" id="arr-${catKey}">▶</span>
      </div>
      <div class="prod-cat-body" id="pc-${catKey}">`;
    Object.entries(cat.subcats).forEach(([subcat, brands]) => {
      html += `<div class="prod-subcat">
        <div class="prod-subcat-label">${subcat}</div>
        <div class="brand-chips">`;
      brands.forEach(b => {
        const key = b.catLabel+'||'+b.subcat+'||'+b.brand;
        const sel = saved.has(key);
        html += `<span class="brand-chip ${sel?'selected':''}" 
          data-cat="${b.catKey}" data-catlabel="${b.catLabel}" data-subcat="${b.subcat}" data-brand="${b.brand}"
          onclick="toggleBrandChip(this)">
          <span class="chip-check"></span>${b.brand}
        </span>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  html += '</div>';
  return html;
}

function toggleProdCat(id) {
  const body = document.getElementById(id);
  const catKey = id.replace('pc-','');
  const arr = document.getElementById('arr-'+catKey);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  arr.classList.toggle('open', isOpen);
}

function toggleBrandChip(el) {
  el.classList.toggle('selected');
  // CSS pseudo-element handles the ✓/✕ display
  // update cat header count
  const catKey = el.dataset.cat;
  const count = document.querySelectorAll(`.brand-chip[data-cat="${catKey}"].selected`).length;
  const head = document.querySelector(`#pc-${catKey}`).previousElementSibling;
  let badge = head.querySelector('.cat-count-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'cat-count-badge';
    badge.style.cssText = 'color:var(--accent);font-size:11px;margin-left:4px;';
    head.querySelector('span').appendChild(badge);
  }
  badge.textContent = count ? `✓${count}` : '';
}

function onPartCatChange() {
  const cat = document.getElementById('pf-category').value;
  const isVendor = cat === '原廠';
  const isDealer = cat === '代理商';
  const wrap = document.getElementById('pf-company-wrap');
  if (!wrap) return;
  if (isVendor) {
    wrap.innerHTML = `<select id="pf-company" class="form-control" onchange="onPartCompanyChange()">
      <option value="">請選擇原廠</option>
      ${DB_VENDORS.list.map(v=>`<option value="${v.nameZh||v.nameEn}" data-en="${v.nameEn||''}" data-id="${v.id}">${v.nameZh||v.nameEn}</option>`).join('')}
    </select>`;
  } else {
    wrap.innerHTML = `<input id="pf-company" class="form-control" placeholder="中文名稱" value="">`;
  }
  const picker = document.getElementById('pf-brand-picker');
  const label  = picker?.previousElementSibling;
  if (picker) {
    if (isDealer) {
      if (label) label.innerHTML = '代理原廠品牌 <span style="font-weight:400;color:var(--text3);margin-left:6px;">勾選代理的原廠，可複選</span>';
      picker.innerHTML = buildVendorBrandPicker([]);
    } else {
      if (label) label.innerHTML = '代理產品/品牌 <span style="font-weight:400;color:var(--text3);margin-left:6px;">點選細項即可勾選，可複選</span>';
      picker.innerHTML = buildVendorProductPicker([], '');
    }
  }
}

function onPartCompanyChange() {
  const sel = document.getElementById('pf-company');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const en = opt?.dataset?.en || '';
  const vid = parseInt(opt?.dataset?.id) || '';
  const enInput = document.getElementById('pf-companyEn');
  if (enInput) enInput.value = en;

  // Build auto-selected brands from this vendor's products
  const autoSelected = [];
  if (vid) {
    const v = DB_VENDORS.list.find(x => x.id === vid);
    if (v) {
      v.products.forEach(p => {
        if (!p.cat || !p.sub) return;
        const catLabel = PROD_CATS[p.cat]?.label || p.cat;
        // Add sub as brand
        autoSelected.push({ catKey: p.cat, catLabel, subcat: p.sub, brand: p.sub });
        // Add productName as brand if present
        if (p.productName) autoSelected.push({ catKey: p.cat, catLabel, subcat: p.sub, brand: p.productName });
      });
    }
  }

  const picker = document.getElementById('pf-brand-picker');
  if (picker) picker.innerHTML = buildVendorProductPicker(autoSelected, vid);
}

function addPfContactRow() {
  const wrap = document.getElementById('pf-contacts-wrap');
  if (!wrap) return;
  const idx = wrap.querySelectorAll('.contact-row').length;
  const div = document.createElement('div');
  div.innerHTML = buildPfContactRow({}, idx);
  wrap.appendChild(div.firstElementChild);
}

function removePfContactRow(i) {
  const row = document.getElementById('pf-ct-row-'+i);
  if (row) row.remove();
  const wrap = document.getElementById('pf-contacts-wrap');
  if (!wrap) return;
  wrap.querySelectorAll('.contact-row').forEach((r, idx) => {
    r.id = 'pf-ct-row-'+idx;
    const lbl = r.querySelector('span[style*="font-weight:700"]');
    if (lbl) lbl.textContent = `聯繫人 ${idx+1}`;
    const btn = r.querySelector('.contact-row-del');
    if (btn) {
      if (idx === 0) btn.remove();
      else btn.setAttribute('onclick', `removePfContactRow(${idx})`);
    }
  });
}

function getPfContacts() {
  const wrap = document.getElementById('pf-contacts-wrap');
  if (!wrap) return [{name:'尚無',dept:'',phone:'',mail:'',job:'',primary:true}];
  const primaryVal = wrap.querySelector('.pf-ct-primary:checked')?.value;
  const rows = wrap.querySelectorAll('.contact-row');
  const result = [];
  rows.forEach((row, idx) => {
    result.push({
      name:    row.querySelector('.pf-ct-name')?.value.trim()  || '尚無',
      dept:    row.querySelector('.pf-ct-dept')?.value.trim()  || '',
      phone:   row.querySelector('.pf-ct-phone')?.value.trim() || '',
      mail:    row.querySelector('.pf-ct-mail')?.value.trim()  || '',
      job:     row.querySelector('.pf-ct-job')?.value.trim()   || '',
      primary: String(idx) === String(primaryVal),
    });
  });
  // Ensure at least one primary
  if (result.length && !result.some(c=>c.primary)) result[0].primary = true;
  return result.length ? result : [{name:'尚無',dept:'',phone:'',mail:'',job:'',primary:true}];
}

function savePartner(id) {
  const company = document.getElementById('pf-company')?.value?.trim() || '';
  const companyEn = document.getElementById('pf-companyEn')?.value?.trim() || '';
  if (!company && !companyEn) { toast('⚠ 請輸入公司名稱'); return false; }
  const obj = {
    id: id || DB.nextPartId++,
    company,
    companyEn,
    contacts: getPfContacts(),
    category: document.getElementById('pf-category').value,
    brands: getSelectedBrands(),
    logs: id ? DB.partners.find(p=>p.id===id)?.logs||[] : [],
  };
  if (id) {
    DB.partners[DB.partners.findIndex(p=>p.id===id)] = obj;
    showLoadingOverlay('儲存中…');
    sbSavePart(obj, true).then(() => {
      hideLoadingOverlay();
      toast('✅ 窗口資料已更新');
      setTimeout(() => showPartnerViewModal(DB.partners.find(p=>p.id===id)), 100);
    }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); });
  } else {
    DB.partners.push(obj);
    showLoadingOverlay('儲存中…');
    sbSavePart(obj, false).then(() => {
      hideLoadingOverlay();
      toast('✅ 新增窗口成功');
      refreshPartList();
    }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); });
  }
  return true;
}

    list = list.filter(v =>
      (v.nameZh||'').toLowerCase().includes(kw) ||
      (v.nameEn||'').toLowerCase().includes(kw) ||
      (v.country||'').includes(kw) ||
      v.products.some(p => (p.sub||'').toLowerCase().includes(kw) || (p.productName||'').toLowerCase().includes(kw))
    );
  }
  if (_VF.country)  list = list.filter(v => (v.country||'') === _VF.country);
  if (_VF.cat)      list = list.filter(v => v.cats.includes(_VF.cat));
  if (_VF.sub)      list = list.filter(v => v.products.some(p => p.sub === _VF.sub));
  if (_VF.audience) list = list.filter(v => v.products.some(p => (p.audiences||[]).some(a => a === _VF.audience || a.startsWith(_VF.audience+'|'))));

  script.onload = () => {
    const wb = XLSX.utils.book_new();

    // Header row + sample rows
    const data = [
      ['中文名稱','英文名稱','國別','類別','細項','產品名稱','產品特點'],
      ['飛塔','Fortinet','美國','hardware','防火牆','FortiGate','次世代防火牆 NGFW、SD-WAN'],
      ['飛塔','Fortinet','美國','hardware','WAF','FortiWeb','Web 應用程式防火牆'],
      ['趨勢科技','Trend Micro','日本','security','防毒','Apex One','端點防護、AI 偵測'],
      ['趨勢科技','Trend Micro','日本','security','EDR','Apex One EDR','行為分析偵測'],
      ['','','','','','','（每個原廠可填多列，相同中文名稱視為同一家）'],
    ];

    const ws = XLSX.utils.aoa_to_sheet(data);

    // Column widths
    ws['!cols'] = [
      {wch:14},{wch:18},{wch:8},{wch:14},{wch:14},{wch:20},{wch:32}
    ];

    XLSX.utils.book_append_sheet(wb, ws, '原廠資料');

    // Add reference sheet
    const ref = [
      ['類別代碼','說明'],
      ['hardware','基礎infra建置'],
      ['software','基礎軟體授權'],
      ['security','資訊安全'],
      ['service','人力技術/保固'],
      ['',''],
      ['常用細項參考',''],
      ['防火牆','WAF','交換器','無線網路','伺服器','Storage','NAS'],
      ['防毒','資產盤點','端點DLP','EDR','MDR','SOC','弱點掃描'],
      ['微軟授權','Adobe授權','虛擬化平台','備份軟體'],
    ];

  document.head.appendChild(script);
}

// Store parsed vendors for executeExcelImport
window._pendingImportVendors = [];

function onExcelImport(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('import-preview');
  if (preview) preview.innerHTML = '<div style="color:var(--text3);font-size:12px;">解析中…</div>';

  const loadXLSX = cb => {
    if (window.XLSX) { cb(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload = cb;
    s.onerror = () => { if(preview) preview.innerHTML = '<div style="color:var(--red);font-size:12px;">❌ 無法載入 Excel 解析元件</div>'; };
    document.head.appendChild(s);
  };

  loadXLSX(() => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

        // Parse rows (skip header)
        const vendorMap = {};
        const CAT_MAP = { hardware:'hardware', software:'software', security:'security', service:'service',
          硬體:'hardware', 軟體授權:'software', 資訊安全:'security', '人力技術/保固':'service' };

        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const nameZh = String(r[0]||'').trim();
          const nameEn = String(r[1]||'').trim();
          const country = String(r[2]||'').trim();
          const catRaw  = String(r[3]||'').trim();
          const sub     = String(r[4]||'').trim();
          const pname   = String(r[5]||'').trim();
          const feat    = String(r[6]||'').trim();

          if (!nameZh && !nameEn) continue;
          const key = nameZh || nameEn;
          if (!vendorMap[key]) vendorMap[key] = { nameZh, nameEn, country, cats:[], products:[] };
          if (sub || pname) {
            const cat = CAT_MAP[catRaw] || catRaw || 'hardware';
            vendorMap[key].products.push({ cat, sub, productName:pname, features:feat, audiences:[] });
          }
        }

        const vendors = Object.values(vendorMap);
        vendors.forEach(v => {
          v.cats = [...new Set(v.products.map(p=>p.cat).filter(Boolean))];
        });

        window._pendingImportVendors = vendors;

        if (!vendors.length) {
          if (preview) preview.innerHTML = '<div style="color:var(--orange);font-size:12px;">⚠ 未讀取到資料，請確認是否使用正確範本</div>';
          return;
        }

        const rows_html = vendors.map(v => {
          const name = [v.nameZh, v.nameEn].filter(Boolean).join(' / ');
          const country = v.country ? ' (' + v.country + ')' : '';
          return '<div style="font-size:12px;color:var(--text2);padding:3px 0;">• <strong>' + name + '</strong>' + country + ' — ' + v.products.length + ' 項產品</div>';
        }).join('');

        if (preview) preview.innerHTML =
          '<div style="background:var(--accent-glow);border:1px solid var(--border2);border-radius:8px;padding:12px;">' +
          '<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;">✅ 解析成功，預覽 ' + vendors.length + ' 筆原廠：</div>' +
          rows_html +
          '<div style="font-size:11px;color:var(--text3);margin-top:8px;">確認無誤後點「儲存」匯入</div>' +
          '</div>';

      } catch(err) {
        if (preview) preview.innerHTML = '<div style="color:var(--red);font-size:12px;">❌ 解析失敗：' + err.message + '</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function executeExcelImport() {
  const vendors = window._pendingImportVendors || [];
  if (!vendors.length) { toast('⚠ 請先上傳 Excel 檔案'); return false; }

  let added = 0, merged = 0;
  vendors.forEach(v => {
    const sim = findSimilarVendor(v.nameZh, null);
    if (sim) {
      sim.products.push(...v.products);
      sim.cats = [...new Set([...sim.cats, ...v.cats])];
      if (v.nameEn && !sim.nameEn) sim.nameEn = v.nameEn;
      if (v.country && !sim.country) sim.country = v.country;
      merged++;
    } else {
      const vobj = { ...v, id: DB_VENDORS.nextId++ };
      DB_VENDORS.list.push(vobj);
      sbSaveVendor(vobj, false).catch(e => console.warn('vendor import err:', e));
      added++;
    }
  });

  window._pendingImportVendors = [];
  toast('✅ 匯入完成：新增 ' + added + ' 筆，合併 ' + merged + ' 筆');
  return true;
}

    if (!v.products.length) return '<div style="color:var(--text3);font-size:13px;">尚無產品項目</div>';

    const rows = subs.map(sub => {
      const others = DB_VENDORS.list.filter(ov => ov.id !== v.id && ov.products.some(p=>p.sub===sub));

              <div style="font-size:11px;color:var(--text2);margin-top:3px;">

  <div class="detail-wrap">
    <div>

        <div class="detail-card-head">
          <h3>原廠資訊</h3>
          <button class="btn btn-ghost btn-sm" onclick="openEditVendor(${v.id})">✏️ 編輯</button>
        </div>
        <div class="detail-card-body">
          <div class="detail-row"><div class="detail-key">中文名稱</div><div class="detail-val"><strong>${v.nameZh||'-'}</strong></div></div>
          <div class="detail-row"><div class="detail-key">英文名稱</div><div class="detail-val">${v.nameEn||'-'}</div></div>
          <div class="detail-row"><div class="detail-key">國別</div><div class="detail-val">${v.country||'-'}</div></div>
          <div class="detail-row"><div class="detail-key">產品類別</div><div class="detail-val">${v.cats.map(k=>`<span class="tag">${PROD_CATS[k]?.icon||''} ${PROD_CATS[k]?.label||k}</span>`).join(' ')}</div></div>
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-card-head">
          <h3>產品項目 (${v.products.length})</h3>
          <button class="btn btn-primary btn-sm" onclick="openAddProduct(${v.id})">＋ 新增產品</button>
        </div>
        <div class="detail-card-body">
          ${v.products.length === 0 ? '<div style="color:var(--text3);font-size:13px;">尚無產品項目</div>' :
            Object.entries(grouped).map(([catKey, prods]) => `
              <div style="margin-bottom:16px;">
                <div style="font-size:11px;font-weight:700;color:var(--accent);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);">
                  ${PROD_CATS[catKey]?.icon||''} ${PROD_CATS[catKey]?.label||catKey}
                </div>
                ${prods.map((p) => `
                  <div class="vd-log-item" style="padding:10px 0;">
                    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
                      <div style="flex:1;">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">
                          <span class="tag" style="font-weight:700">${p.sub}</span>
                          ${p.productName ? `<strong style="font-size:13px">${p.productName}</strong>` : ''}
                        </div>
                        ${p.features ? `<div style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:4px;">✦ ${p.features}</div>` : ''}
                        ${(p.productType||[]).length ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;">${p.productType.map(t=>`<span class="tag" style="font-size:10px;background:var(--surface2)">${t}</span>`).join('')}${(Array.isArray(p.licenseType)?p.licenseType:(p.licenseType?[p.licenseType]:[])).map(l=>`<span class="tag" style="font-size:10px;color:var(--accent);border-color:var(--accent)">${l}</span>`).join('')}</div>` : ''}

function buildAudienceOptions() {
  const indOpts = [
    '企業|製造業','企業|高科技/半導體','企業|醫療生技','企業|食品業','企業|服務業',
    '政府','醫療','教育','財團法人'
  ];
  const pcOpts = ['50台以下','200台以下','300台以下','300台以上'];
  // Add any from actual customer data not already in list
  const industryLabel = { gov:'政府', medical:'醫療', edu:'教育', corp:'企業', npo:'財團法人' };
  DB.customers.forEach(c => {
    const ind = industryLabel[c.industry]||c.industry;
    const full = c.industryDetail ? `${ind}|${c.industryDetail}` : ind;
    if (!indOpts.includes(full) && !['企業'].includes(full)) indOpts.push(full);
    if (c.pcscale && !pcOpts.includes(c.pcscale)) pcOpts.push(c.pcscale);
  });
  return { industry: indOpts, pc: pcOpts };
}

function buildAudChips(opts, selAud) {
  return opts.map(a=>`

}

      <textarea class="form-control vf-pr-feat" placeholder="產品特點…" rows="3" style="flex:1;min-width:0;font-size:12px;resize:none;">${p.features||''}</textarea>
      <div style="flex:0 0 auto;display:flex;flex-direction:column;gap:8px;min-width:160px;">
        <div>
          <div style="font-size:11px;color:var(--text3);margin-bottom:4px;font-weight:700;">產品型態（可複選）</div>
          <div style="display:flex;gap:4px;">
            ${['硬體','軟體'].map(t => {

              const sel = selLics.includes(l);
              return `<label class="aud-chip ${sel?'selected':''}" onclick="toggleVfLic(this,${i},'${l}')">

function toggleVfType(lbl, i, type) {
  const cb = lbl.querySelector('input');
  cb.checked = !cb.checked;
  lbl.classList.toggle('selected', cb.checked);
  // Show/hide license section if 軟體 toggled
  if (type === '軟體') {
    const wrap = document.getElementById('vf-lic-wrap-'+i);
    if (wrap) wrap.style.display = cb.checked ? '' : 'none';
  }
}

function toggleVfLic(lbl, i, lic) {
  const cb = lbl.querySelector('input');
  cb.checked = !cb.checked;
  lbl.classList.toggle('selected', cb.checked);
}

function renderVfProductRows() {
  if (!_vfProducts.length) return `<div style="color:var(--text3);font-size:12px;padding:8px 0;">尚無產品，點「＋ 新增一列」加入</div>`;

function onVfRowCatChange(i, catKey) {
  const subSel = document.getElementById('vf-pr-sub-'+i);
  if (subSel) subSel.innerHTML = buildSubOpts(catKey, '');
  _vfProducts[i].cat = catKey;
  _vfProducts[i].sub = '';

  const ci = document.getElementById('vf-pr-custom-'+i);
  if (ci) ci.style.display = 'none';
}

function onVfSubChange(i, val) {
  if (val === '__custom__') {
    let ci = document.getElementById('vf-pr-custom-'+i);
    if (!ci) {
      ci = document.createElement('div');
      ci.id = 'vf-pr-custom-'+i;
      ci.style.cssText = 'display:flex;gap:5px;margin-top:5px;width:100%;';
      ci.innerHTML = `<input id="vf-pr-ci-${i}" class="form-control" placeholder="輸入新細項名稱…" style="flex:1"
        onkeydown="if(event.key==='Enter'){event.preventDefault();confirmVfCustom(${i});}">
        <button type="button" class="btn btn-primary btn-sm" onclick="confirmVfCustom(${i})">確認</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="this.parentElement.style.display='none'">✕</button>`;
      document.getElementById('vf-pr-'+i)?.appendChild(ci);
    }
    ci.style.display = 'flex';
    document.getElementById('vf-pr-ci-'+i)?.focus();
  } else {
    _vfProducts[i].sub = val;
    const ci = document.getElementById('vf-pr-custom-'+i);
    if (ci) ci.style.display = 'none';
  }
}

function confirmVfCustom(i) {
  const inp = document.getElementById('vf-pr-ci-'+i);
  const name = inp?.value.trim();
  if (!name) { inp?.focus(); return; }
  const catKey = document.querySelector(`#vf-pr-${i} .vf-pr-cat`)?.value;
  if (catKey) {
    if (!_extraSubs[catKey]) _extraSubs[catKey] = [];
    if (!_extraSubs[catKey].includes(name)) _extraSubs[catKey].push(name);
  }
  _vfProducts[i].sub = name;
  const subSel = document.getElementById('vf-pr-sub-'+i);
  if (subSel) subSel.innerHTML = buildSubOpts(catKey, name);
  const ci = document.getElementById('vf-pr-custom-'+i);
  if (ci) ci.style.display = 'none';
  toast(`✅ 已新增細項「${name}」`);
}

function addVfProductRow() {
  const catKeys = Object.keys(PROD_CATS);
  _vfProducts.push({ cat: catKeys[0], sub:'', productName:'', features:'', audiences:[], productType:[], licenseType:[] });
  const wrap = document.getElementById('vf-prod-wrap');
  if (wrap) wrap.innerHTML = renderVfProductRows();
}

function removeVfRow(i) {
  _vfProducts.splice(i,1);
  const wrap = document.getElementById('vf-prod-wrap');
  if (wrap) wrap.innerHTML = renderVfProductRows();
}

function collectVfProducts() {
  const rows = document.querySelectorAll('.vf-prod-row');
  const result = [];
  rows.forEach((row) => {
    const cat  = row.querySelector('.vf-pr-cat')?.value||'';
    let sub    = row.querySelector('.vf-pr-sub')?.value||'';
    const name = row.querySelector('.vf-pr-name')?.value.trim()||'';
    const feat = row.querySelector('.vf-pr-feat')?.value.trim()||'';
    const auds = [...row.querySelectorAll('.aud-chip input:checked')].map(el=>el.value);
    const productType = [...row.querySelectorAll('[onclick*="toggleVfType"] input:checked')].map(el=>{
      const lbl = el.closest('label');
      return lbl ? lbl.textContent.trim() : '';
    }).filter(Boolean);
    const licenseType = [...row.querySelectorAll('[onclick*="toggleVfLic"] input:checked')].map(el=>el.closest('label')?.textContent.trim()).filter(Boolean);
    if (sub === '__custom__') sub = '';
    if (cat) result.push({ cat, sub, productName:name, features:feat, audiences:auds, productType, licenseType });
  });
  return result;
}

function findSimilarVendor(nameZh, excludeId) {
  if (!nameZh || nameZh.length < 2) return null;
  return DB_VENDORS.list.find(v => {
    if (v.id === excludeId) return false;
    const existing = v.nameZh || '';
    if (!existing) return false;
    // Count matching characters (any 2+ chars in common)
    let matches = 0;
    for (const ch of nameZh) {
      if (existing.includes(ch)) matches++;
      if (matches >= 2) return true;
    }
    return false;
  });
}

function saveVendor(id) {
  const nameZh = document.getElementById('vf-nameZh')?.value.trim()||'';
  const nameEn = document.getElementById('vf-nameEn')?.value.trim()||'';
  if (!nameZh && !nameEn) { toast('⚠ 請輸入中文或英文名稱'); return false; }

  // Duplicate check (new vendor only, or name changed)
  if (!id && nameZh) {
    const similar = findSimilarVendor(nameZh, id);
    if (similar) {
      showVendorDupModal(similar, nameZh, nameEn, id);
      return false;
    }
  }

  return doSaveVendor(id, nameZh, nameEn);
}

function showVendorDupModal(existing, nameZh, nameEn, id) {
  const overlay = document.createElement('div');
  overlay.id = 'vendor-dup-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,40,10,0.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;';
  const existName = [existing.nameZh, existing.nameEn].filter(Boolean).join(' / ');
  overlay.innerHTML = `
    <div style="background:var(--surface);border:2px solid var(--border);border-radius:16px;max-width:460px;width:100%;overflow:hidden;">
      <div style="background:var(--surface2);padding:18px 22px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;">⚠️</span>
        <h3 style="font-size:15px;font-weight:700;color:var(--text)">發現相似原廠名稱</h3>
      </div>
      <div style="padding:22px;">
        <p style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:16px;">
          「<strong>${nameZh}</strong>」與現有原廠「<strong>${existName}</strong>」名稱有 2 個以上相同字元。
        </p>
        <p style="font-size:12px;color:var(--text2);margin-bottom:16px;">請選擇處理方式：</p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <button onclick="vendorDupReplace(${existing.id})" class="dup-btn dup-btn-replace">
            <span style="font-size:16px;">🔄</span>
            <div><div style="font-weight:700">取代</div><div style="font-size:11px;opacity:0.8">刪除「${existName}」，以目前填寫的新資料取代</div></div>
          </button>
          <button onclick="vendorDupCancel()" class="dup-btn dup-btn-keep">
            <span style="font-size:16px;">✏️</span>
            <div><div style="font-weight:700">取消</div><div style="font-size:11px;opacity:0.8">返回編輯，不做任何變更</div></div>
          </button>
          <button onclick="vendorDupAdd(${existing.id})" class="dup-btn" style="background:var(--accent-glow);border:1.5px solid var(--border2);color:var(--accent2);">
            <span style="font-size:16px;">➕</span>
            <div><div style="font-weight:700">新增</div><div style="font-size:11px;opacity:0.8">保留原有資料，同時新增為獨立原廠</div></div>
          </button>
        </div>
      </div>
    </div>`;
  window._vendorDupPending = { nameZh, nameEn, id };
  document.body.appendChild(overlay);
}

function vendorDupReplace(existId) {
  document.getElementById('vendor-dup-overlay')?.remove();
  const p = window._vendorDupPending;
  if (!p) return;

function doSaveVendor(id, nameZh, nameEn) {
  const products = collectVfProducts();
  const cats = [...new Set(products.map(p=>p.cat).filter(Boolean))];
  const obj = {
    id: id || DB_VENDORS.nextId++,
    nameZh, nameEn,
    country: document.getElementById('vf-country')?.value.trim()||'',
    cats,
    products,
  };
  if (id) {
    const idx = DB_VENDORS.list.findIndex(v=>v.id===id);
    DB_VENDORS.list[idx] = obj;
    vendorDetailId = id;
    showLoadingOverlay('儲存中…');
    sbSaveVendor(obj, true).then(() => {
      hideLoadingOverlay(); toast('✅ 原廠資料已更新');
    }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); });
  } else {
    DB_VENDORS.list.push(obj);
    showLoadingOverlay('儲存中…');
    sbSaveVendor(obj, false).then(() => {
      vendorDetailId = obj.id;
      hideLoadingOverlay(); toast('✅ 新增原廠成功');
    }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); });
  }
  return true;
}

function onPfSubChange(val) {
  if (val === '__custom__') {
    const wrap = document.getElementById('pf-custom-wrap');
    if (wrap) { wrap.style.display = ''; document.getElementById('pf-custom-input')?.focus(); }
  } else {
    cancelPfCustom();
  }
}

function confirmPfCustom() {
  const inp = document.getElementById('pf-custom-input');
  const name = inp?.value.trim();
  if (!name) { inp?.focus(); return; }
  const catKey = document.getElementById('pf-cat')?.value;
  if (catKey) {
    if (!_extraSubs[catKey]) _extraSubs[catKey] = [];
    if (!_extraSubs[catKey].includes(name)) _extraSubs[catKey].push(name);
  }
  const subSel = document.getElementById('pf-sub');
  if (subSel) subSel.innerHTML = buildSubOpts(catKey, name);
  cancelPfCustom();
  toast(`✅ 已新增細項「${name}」`);
}

function cancelPfCustom() {
  const wrap = document.getElementById('pf-custom-wrap');
  if (wrap) wrap.style.display = 'none';
  const inp = document.getElementById('pf-custom-input');
  if (inp) inp.value = '';
}

function buildSubOpts(catKey, selected) {
  const subs = getAllSubs(catKey);
  const opts = subs.map(s=>`<option value="${s}" ${selected===s?'selected':''}>${s}</option>`).join('');
  return opts + `<option value="__custom__">＋ 新增自訂細項…</option>`;
}

function saveProduct(vendorId, idx) {
  const v = DB_VENDORS.list.find(x=>x.id===vendorId);
  if (!v) return false;
  let sub = document.getElementById('pf-sub')?.value;
  if (sub === '__custom__') {
    const customVal = document.getElementById('pf-custom-input')?.value.trim();
    if (customVal) { confirmPfCustom(); sub = customVal; }
    else { toast('⚠ 請先確認新細項名稱'); return false; }
  }
  const catKey = document.getElementById('pf-cat')?.value;
  const auds = [...document.querySelectorAll('.aud-chip input:checked')].map(el=>el.value);
  const productType = [...document.querySelectorAll('[onclick*="togglePfType"] input:checked')].map(el=>el.closest('label')?.textContent.trim()).filter(Boolean);
  const licenseType = [...document.querySelectorAll('[onclick*="togglePfLic"] input:checked')].map(el=>el.closest('label')?.textContent.trim()).filter(Boolean);
  const prod = {
    cat: catKey, sub,
    productName: document.getElementById('pf-name')?.value.trim()||'',
    features: document.getElementById('pf-feat')?.value.trim()||'',
    audiences: auds,
    productType,
    licenseType,
  };
  if (idx !== null && idx !== undefined) { v.products[idx]=prod; toast('✅ 產品已更新'); }
  else { v.products.push(prod); if(!v.cats.includes(catKey)) v.cats.push(catKey); toast('✅ 產品已新增'); }
  return true;
}

const _modals = {};

function openModal(id, title, bodyHtml, onSave) {
  let overlay = document.getElementById('overlay-'+id);
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'overlay-'+id;
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-head">
          <h2 id="modal-title-${id}"></h2>
          <button class="modal-close" onclick="closeModal('${id}')">✕</button>
        </div>
        <div class="modal-body" id="modal-body-${id}"></div>
        <div class="modal-foot" id="modal-foot-${id}"></div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(id); });
  }
  document.getElementById('modal-title-'+id).textContent = title;
  document.getElementById('modal-body-'+id).innerHTML = bodyHtml;
  
  const foot = document.getElementById('modal-foot-'+id);
  if (onSave) {
    _modals[id] = onSave;
    foot.innerHTML = `
      <button class="btn btn-ghost" onclick="closeModal('${id}')">取消</button>
      <button class="btn btn-primary" onclick="doSave('${id}')">儲存</button>`;
  } else {
    foot.innerHTML = `<button class="btn btn-ghost" onclick="closeModal('${id}')">關閉</button>`;
  }
  overlay.classList.add('open');
}

function doSave(id) {
  const fn = _modals[id];
  if (fn && fn() !== false) {
    closeModal(id);
    renderPage(currentPage);
  }
}

function closeModal(id) {
  const overlay = document.getElementById('overlay-'+id);
  if (overlay) overlay.classList.remove('open');
}

// ── Refresh with focus preservation ──
function _refreshWithFocus(containerId, renderFn, inputId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  // Save cursor position if the search input is focused
  const active = document.activeElement;
  const isFocused = active && active.id === inputId;
  const selStart = isFocused ? active.selectionStart : null;
  const selEnd   = isFocused ? active.selectionEnd   : null;

  el.innerHTML = renderFn();

  // Restore focus and cursor
  if (isFocused) {
    const newInput = document.getElementById(inputId);
    if (newInput) {
      newInput.focus();
      try { newInput.setSelectionRange(selStart, selEnd); } catch(e) {}
    }
  }
}

function onCustExcelUpload(input) {
  const file = input.files[0]; if (!file) return;
  const preview = document.getElementById('cust-import-preview');
  if (preview) preview.innerHTML = '<div style="color:var(--text3);font-size:12px;">解析中…</div>';
  loadXLSX(() => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array'});
        const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
        const customers = [];
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const name = String(r[0]||'').trim();
          if (!name) continue;
          customers.push({
            id: DB.nextCustId++,
            company: name,
            phone: String(r[1]||'').trim(),
            address: String(r[2]||'').trim(),
            taxid: String(r[3]||'').trim(),
            industry: String(r[4]||'corp').trim() || 'corp',
            industryDetail: String(r[5]||'').trim(),
            level: String(r[6]||'L0').trim() || 'L0',
            owner: String(r[7]||'').trim(),
            source: String(r[8]||'陌生開發').trim() || '陌生開發',
            sourceNote: '',
            si: String(r[9]||'').trim(),
            pcscale: String(r[10]||'').trim(),
            listed: String(r[11]||'').trim() === '1',
            blocked: String(r[12]||'').trim() === '1',
            notes: String(r[13]||'').trim(),
            contacts: [{name:'尚無',dept:'',ext:'',mail:'',job:'',primary:true}],
            logs: [],
          });
        }
        window._pendingCustImport = customers;
        if (!customers.length) {
          if (preview) preview.innerHTML = '<div style="color:var(--orange);font-size:12px;">⚠ 未讀取到資料</div>';
          return;
        }
        if (preview) preview.innerHTML =
          '<div style="background:var(--accent-glow);border:1px solid var(--border2);border-radius:8px;padding:12px;">' +
          '<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:8px;">✅ 解析成功，預覽 ' + customers.length + ' 筆客戶：</div>' +
          customers.map(c => '<div style="font-size:12px;color:var(--text2);padding:2px 0;">• <strong>' + c.company + '</strong> ' + c.level + ' ' + (c.phone||'') + '</div>').join('') +
          '<div style="font-size:11px;color:var(--text3);margin-top:8px;">確認後點「儲存」匯入</div></div>';
      } catch(err) {
        if (preview) preview.innerHTML = '<div style="color:var(--red);font-size:12px;">❌ 解析失敗：' + err.message + '</div>';
      }
    };
    reader.readAsArrayBuffer(file);
  });
}

function executeCustImport() {
  const list = window._pendingCustImport || [];
  if (!list.length) { toast('⚠ 請先上傳 Excel 檔案'); return false; }
  let added = 0, skipped = 0;
  const toAdd = [];
  list.forEach(c => {
    const dup = c.taxid ? DB.customers.find(x => x.taxid === c.taxid) : null;
    if (dup) { skipped++; return; }
    DB.customers.push(c);
    toAdd.push(c);
    added++;
  });
  window._pendingCustImport = [];
  if (toAdd.length) {
    showLoadingOverlay('匯入中…');
    Promise.all(toAdd.map(cc => sbSaveCust(cc, false)))
      .then(() => { hideLoadingOverlay(); toast('✅ 匯入完成：新增 ' + added + ' 筆，略過重複 ' + skipped + ' 筆'); })
      .catch(e => { hideLoadingOverlay(); toast('❌ 匯入失敗：' + e.message); });
  }
  return true;
}

const ACCOUNTS = {
  'biz2024':   '系統管理員',
  'sara2024':  'Sara',
  'amber2024': 'Amber',
  'iris2024':  'Iris',
};
// ↑ 可自行修改密碼和對應名稱

function doLogin() {
  const pw = document.getElementById('login-pw')?.value || '';
  const err = document.getElementById('login-err');
  const name = ACCOUNTS[pw.trim()];
  if (name) {
    sessionStorage.setItem('crm_auth', 'ok');
    sessionStorage.setItem('crm_user', name);
    const screen = document.getElementById('login-screen');
    if (screen) {
      screen.style.transition = 'opacity 0.4s';
      screen.style.opacity = '0';
      setTimeout(() => screen.remove(), 400);
    }
    updateSidebarUser(name);
    loadFromSupabase();
  } else {
    if (err) {
      err.textContent = '密碼錯誤，請再試一次';
      const input = document.getElementById('login-pw');
      if (input) { input.style.borderColor = '#c0392b'; input.value = ''; input.focus(); }
      setTimeout(() => {
        if (err) err.textContent = '';
        if (input) input.style.borderColor = '#D6E8C0';
      }, 2000);
    }
  }
}

function updateSidebarUser(name) {
  const nameEl = document.getElementById('sidebar-user-name');
  const initEl = document.getElementById('sidebar-user-initial');
  if (nameEl) nameEl.textContent = name;
  if (initEl) initEl.textContent = name.charAt(0);
}

function doLogout() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,40,10,0.55);z-index:99998;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:28px 32px;max-width:320px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.25);">
      <div style="font-size:24px;margin-bottom:10px;">👋</div>
      <div style="font-size:16px;font-weight:700;color:#1a3a0f;margin-bottom:6px;">確定要登出？</div>
      <div style="font-size:13px;color:#888;margin-bottom:22px;">登出後需重新輸入密碼</div>
      <div style="display:flex;gap:10px;">
        <button onclick="this.closest('div[style*=fixed]').remove()" style="flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;background:#f5f5f5;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">取消</button>
        <button onclick="sessionStorage.clear();location.reload();" style="flex:1;padding:10px;border:none;border-radius:8px;background:#3A7D2C;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">登出</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function togglePw() {
  const inp = document.getElementById('login-pw');
  const eye = document.getElementById('pw-eye');
  if (!inp) return;
  inp.type = inp.type === 'password' ? 'text' : 'password';
  if (eye) eye.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// Check if already authenticated this session
if (sessionStorage.getItem('crm_auth') === 'ok') {
  const screen = document.getElementById('login-screen');
  if (screen) screen.remove();
  const savedUser = sessionStorage.getItem('crm_user') || '使用者';
  updateSidebarUser(savedUser);
  loadFromSupabase();
}
// Otherwise wait for doLogin() to call loadFromSupabase()
