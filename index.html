<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F9F3;
  --surface: #FFFFFF;
  --surface2: #F0F5E8;
  --border: #D6E8C0;
  --border2: #B8D494;
  --accent: #3A7D2C;
  --accent2: #2D6121;
  --accent-glow: rgba(58,125,44,0.10);
  --accent-sun: #E8A020;
  --accent-sun2: #C8860E;
  --sun-glow: rgba(232,160,32,0.18);
  --text: #1E2D14;
  --text2: #4A6535;
  --text3: #7A9560;
  --green: #3A7D2C;
  --yellow: #E8A020;
  --red: #C0392B;
  --orange: #D4691A;
  --purple: #6B4FA0;
  --teal: #1A7A6B;
  --l1: #7A9068;
  --l2: #2B7EC4;
  --l3: #C4811A;
  --l4: #3A7D2C;
  --l5: #7A4FB8;
  --sidebar-bg: #1B3512;
  --sidebar-text: #C8E6A8;
  --sidebar-text2: #8AB870;
  --sidebar-text3: #4A6A35;
  --sidebar-border: #2A4C1C;
  --sidebar-active-bg: rgba(200,230,168,0.14);
  --sidebar-active-text: #D8F0A8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans TC', 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
}

/* SIDEBAR */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--sidebar-border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 110px;
}

.sidebar-logo {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--sidebar-border);
}
.sidebar-logo .logo-mark {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--accent-sun);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.sidebar-logo h1 {
  font-size: 16px;
  font-weight: 700;
  color: var(--sidebar-text);
}

.nav-section { padding: 16px 0; }
.nav-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--sidebar-text3);
  font-weight: 600;
  text-transform: uppercase;
  padding: 0 16px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.18s;
  border-left: 3px solid transparent;
  font-size: 13.5px;
  color: #A8CC88;
}
.nav-item:hover { background: var(--sidebar-active-bg); color: #D8F0A8; }
.nav-item.active {
  background: var(--sidebar-active-bg);
  border-left-color: var(--accent-sun);
  color: #E8F8C8;
  font-weight: 600;
}
.nav-icon { flex-shrink: 0; width: 20px; display: flex; align-items: center; justify-content: center; }
.nav-text { white-space: nowrap; overflow: hidden; }

/* MAIN */
#main {
  margin-left: 220px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
.topbar-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: inherit;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1.5px solid var(--border2);
}
.btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #a93226; }

.content { padding: 24px 28px; }

/* STAT CARDS */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.18s;
}
.stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.stat-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.06em; }
.stat-num { font-size: 28px; font-weight: 700; }
.stat-card.l1 .stat-num { color: var(--l1); }
.stat-card.l2 .stat-num { color: var(--l2); }
.stat-card.l3 .stat-num { color: var(--l3); }
.stat-card.l4 .stat-num { color: var(--l4); }
.stat-card.l5 .stat-num { color: var(--l5); }

/* TABLE */
.table-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.table-header {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  background: var(--surface2);
}
.table-header h3 { font-size: 14px; font-weight: 700; color: var(--text); }
.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  flex: 1;
  max-width: 280px;
}
.search-box:focus-within { border-color: var(--accent); }
.search-box input {
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  width: 100%;
}
.search-box input::placeholder { color: var(--text3); }

table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  padding: 11px 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 1.5px solid var(--border);
  background: var(--surface2);
}
td {
  padding: 13px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--accent-glow); }
.tr-clickable { cursor: pointer; }

/* BADGES */
.badge {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.badge-l0 { background: #F0F0F0; color: #666666; }
.badge-l1 { background: #E8EDE4; color: #5A7050; }
.badge-l2 { background: #E0EEF8; color: #1A5F8A; }
.badge-l3 { background: #FDF0D8; color: #8A5A10; }
.badge-l4 { background: #E4F2DC; color: #2A6820; }
.badge-l5 { background: #EDE8F8; color: #5A3890; }
.badge-gov { background: #DBF0EC; color: #0D6655; }
.badge-med { background: #FDEAEA; color: #922B21; }
.badge-edu { background: #FDF3D8; color: #8A5A10; }
.badge-corp { background: #E4F2DC; color: #256020; }
.badge-npo { background: #EDE8F8; color: #5A3890; }
.badge-phone { background: #E4F2DC; color: #256020; }
.badge-line { background: #E4F2DC; color: #256020; }
.badge-mail { background: #E0EEF8; color: #1A5F8A; }
.badge-meet { background: #FDF0D8; color: #8A5A10; }
.badge-video { background: #EDE8F8; color: #5A3890; }

/* MODAL */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(20,40,10,0.5);
  z-index: 1000;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 760px;
  margin: auto;
}
.modal-head {
  padding: 20px 24px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
  border-radius: 14px 14px 0 0;
}
.modal-head h2 { font-size: 16px; font-weight: 700; color: var(--text); }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--border);
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--accent); color: #fff; }
.modal-body { padding: 24px; }
.modal-foot {
  padding: 16px 24px;
  border-top: 1.5px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  background: var(--surface2);
  border-radius: 0 0 14px 14px;
}

/* FORM */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-full { grid-column: 1/-1; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.05em; }
.form-control {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border 0.15s;
}
.form-control:focus { border-color: var(--accent); background: #fff; }
select.form-control option { background: #fff; color: var(--text); }
textarea.form-control { resize: vertical; min-height: 80px; }
.form-hint { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* DETAIL VIEW */
.detail-wrap {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px;
}
.detail-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.detail-card-head {
  padding: 14px 20px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
}
.detail-card-head h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
.detail-card-body { padding: 16px 20px; }
.detail-row {
  display: flex;
  gap: 16px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.detail-row:last-child { border-bottom: none; }
.detail-key {
  min-width: 100px;
  font-size: 12px;
  color: var(--text3);
  font-weight: 600;
  padding-top: 2px;
}
.detail-val { font-size: 13px; color: var(--text); flex: 1; }

/* LOG */
.log-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
.log-item:last-child { border-bottom: none; }
.log-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.log-date { font-size: 12px; color: var(--text3); font-weight: 600; }
.log-content { font-size: 13px; color: var(--text); line-height: 1.65; }
.log-track { margin-top: 6px; font-size: 11px; color: var(--orange); }

/* CALENDAR */
.cal-wrap { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; }
.cal-head {
  padding: 16px 20px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface2);
}
.cal-head h3 { font-size: 15px; font-weight: 700; color: var(--text); }
.cal-nav { display: flex; gap: 8px; align-items: center; }
.cal-nav button {
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text2);
  width: 30px; height: 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.15s;
}
.cal-nav button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.cal-grid {
  padding: 16px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  background: #fff;
}
.cal-dow {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  padding: 4px 0 8px;
  letter-spacing: 0.06em;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  font-size: 13px;
  color: var(--text);
}
.cal-day:hover { background: var(--surface2); }
.cal-day.today { background: var(--sun-glow); color: var(--accent-sun2); font-weight: 700; border: 1.5px solid var(--accent-sun); }
.cal-day.other-month { color: var(--text3); }
.cal-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent-sun);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  margin-top: 2px;
  box-shadow: 0 1px 4px rgba(232,160,32,0.4);
}

/* CONTACT */
.contact-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
.contact-item:last-child { border-bottom: none; }
.contact-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.contact-info { font-size: 12px; color: var(--text2); line-height: 1.9; }

.sub-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
.sub-item input[type=checkbox] { accent-color: var(--accent); }

.section-divider { margin: 24px 0 16px; display: flex; align-items: center; gap: 12px; }
.section-divider h3 { font-size: 13px; font-weight: 700; color: var(--accent); white-space: nowrap; }
.divider-line { flex: 1; height: 2px; background: var(--border); border-radius: 2px; }

.empty { padding: 48px 24px; text-align: center; color: var(--text3); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

@media (max-width: 900px) {
  #sidebar { width: 60px; min-width: 60px; }
  #main { margin-left: 60px; }
  .sidebar-logo h1, .sidebar-logo .logo-mark, .nav-label, .nav-text { display: none; }
  .nav-item { justify-content: center; padding: 12px 0; }
  .level-grid { grid-template-columns: repeat(3, 1fr); }
  .dash-two-col { grid-template-columns: 1fr; }
  .detail-wrap { grid-template-columns: 1fr; }
}

#toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--accent);
  color: #fff;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  z-index: 9999;
  transform: translateY(60px);
  opacity: 0;
  transition: all 0.25s;
}
#toast.show { transform: translateY(0); opacity: 1; }

.popup-list {
  position: absolute;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 0;
  min-width: 200px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(30,60,14,0.12);
}
.popup-list-item { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.1s; }
.popup-list-item:hover { background: var(--surface2); color: var(--text); }

.tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--border); padding: 0 20px; }
.tab {
  padding: 10px 14px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.15s;
  font-weight: 500;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }

.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 5px;
  font-size: 11px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  margin: 2px;
  font-weight: 500;
}

/* PRODUCT PICKER */
.prod-picker { border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 4px; }
.prod-cat-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  background: var(--surface2);
  cursor: pointer;
  user-select: none;
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.prod-cat-head:last-child { border-bottom: none; }
.prod-cat-head:hover { background: var(--accent-glow); color: var(--accent); }
.prod-cat-icon { font-size: 13px; }
.prod-cat-arrow { font-size: 10px; transition: transform 0.2s; }
.prod-cat-arrow.open { transform: rotate(90deg); }
.prod-cat-body {
  display: none;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  background: #FAFFF6;
}
.prod-cat-body.open { display: block; }
.prod-subcat { margin-bottom: 10px; }
.prod-subcat:last-child { margin-bottom: 0; }
.prod-subcat-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.07em;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.brand-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.brand-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  font-weight: 500;
}
.brand-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.brand-chip.selected {
  background: var(--accent-glow);
  border-color: var(--accent);
  border-width: 2px;
  color: var(--accent2);
  font-weight: 700;
}
.brand-chip .chip-check { font-size: 10px; font-weight: 700; display: none; margin-right: 2px; }
.brand-chip.selected .chip-check { display: inline; }
.brand-chip.selected:hover { background: rgba(192,57,43,0.08); border-color: var(--red) !important; color: var(--red) !important; }
.brand-chip.selected:hover .chip-check::before { content: '✕'; color: var(--red); }
.brand-chip.selected .chip-check::before { content: '✓'; color: var(--accent); }

.prod-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  background: var(--accent-glow);
  border: 1px solid var(--border2);
  color: var(--accent2);
  margin: 2px;
  font-weight: 600;
}
.prod-tag-cat { font-size: 10px; color: var(--text3); margin-right: 2px; }

/* ─── DASHBOARD LEVEL CARDS ─── */
.dash-section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.level-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.level-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
}
.level-card:hover { transform: translateY(-2px); border-color: var(--lc,var(--accent)); box-shadow: 0 4px 14px rgba(0,0,0,0.07); }
.level-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.level-badge {
  font-size: 11px; font-weight: 800;
  padding: 3px 8px; border-radius: 6px;
  letter-spacing: 0.04em;
}
.level-name { font-size: 12px; font-weight: 600; }
.level-num { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.level-hint { font-size: 11px; color: var(--text3); }

/* ─── DASHBOARD TWO COLUMN ─── */
.dash-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;

async function sbGet(table, params) {
  const qs = params ? '?' + params : '?order=created_at.asc';
  const r = await fetch(SB_URL + '/rest/v1/' + table + qs, { headers: SB_HEADERS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbInsert(table, data) {
  const r = await fetch(SB_URL + '/rest/v1/' + table, {
    method:'POST', headers: SB_HEADERS, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbUpdate(table, id, data) {
  const r = await fetch(SB_URL + '/rest/v1/' + table + '?id=eq.' + id, {
    method:'PATCH', headers: SB_HEADERS, body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function sbDelete(table, id) {
  const r = await fetch(SB_URL + '/rest/v1/' + table + '?id=eq.' + id, {

}

// ── Load all data from Supabase on startup ──
async function loadFromSupabase() {
  showLoadingOverlay('載入資料中…');
  try {
    const [custs, parts, vends] = await Promise.all([
      sbGet('customers', 'order=created_at.asc'),
      sbGet('partners',  'order=created_at.asc'),
      sbGet('vendors',   'order=created_at.asc'),
    ]);
    DB.customers = custs.map(rowToCust);
    DB.partners  = parts.map(rowToPart);
    DB_VENDORS.list = vends.map(rowToVendor);
    // Set next IDs
    DB.nextCustId = DB.customers.length ? Math.max(...DB.customers.map(x=>x.id)) + 1 : 1;
    DB.nextPartId = DB.partners.length  ? Math.max(...DB.partners.map(x=>x.id))  + 1 : 1;
    DB_VENDORS.nextId = DB_VENDORS.list.length ? Math.max(...DB_VENDORS.list.map(x=>x.id)) + 1 : 1;
    DB.nextLogId = 1;
    [...DB.customers,...DB.partners].forEach(x=>(x.logs||[]).forEach(l=>{ if(l.id>=DB.nextLogId) DB.nextLogId=l.id+1; }));
    hideLoadingOverlay();
    renderPage('dashboard');
  } catch(e) {
    hideLoadingOverlay();
    showDbError(e.message);
  }
}

function showLoadingOverlay(msg) {
  let el = document.getElementById('sb-loading');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sb-loading';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(20,40,10,0.6);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
    el.innerHTML = '<div style="width:40px;height:40px;border:4px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;"></div><div style="color:#fff;font-size:14px;font-weight:600;">' + msg + '</div>';
    document.body.appendChild(el);
  } else {
    el.querySelector('div:last-child').textContent = msg;
    el.style.display = 'flex';
  }
}
function hideLoadingOverlay() {
  const el = document.getElementById('sb-loading');
  if (el) el.style.display = 'none';
}
function showDbError(msg) {
  toast('❌ 資料庫錯誤：' + msg);
  renderPage('dashboard');
}

    const res = await sbInsert('customers', row);

let calYear, calMonth;
// Stats date range — defaults to current month on first load
let statsFrom = '', statsTo = '';

function getDefaultStatsRange() {
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth()+1;
  const firstDay = `${yr}-${String(mo).padStart(2,'0')}-01`;
  const lastDay = `${yr}-${String(mo).padStart(2,'0')}-${String(new Date(yr,mo,0).getDate()).padStart(2,'0')}`;
  return { from: firstDay, to: lastDay };
}

function applyStatsRange() {
  const f = document.getElementById('stats-from');
  const t = document.getElementById('stats-to');
  if (!f || !t) return;
  if (f.value && t.value && f.value > t.value) { toast('⚠ 起始日期不能晚於結束日期'); return; }
  statsFrom = f.value || getDefaultStatsRange().from;
  statsTo   = t.value || getDefaultStatsRange().to;
  // re-render just the stats block
  renderStatsBlock();
}

function resetStatsRange() {
  const r = getDefaultStatsRange();
  statsFrom = r.from; statsTo = r.to;
  const f = document.getElementById('stats-from');
  const t = document.getElementById('stats-to');
  if (f) f.value = statsFrom;
  if (t) t.value = statsTo;
  renderStatsBlock();
}

function renderStatsBlock() {
  const wrap = document.getElementById('stats-block-body');
  const head = document.getElementById('stats-block-count');
  if (!wrap) return;
  const logs = getLogsInRange(statsFrom, statsTo);
  const methods = ['電話','LINE','MAIL','實體','視訊'];
  const methodCounts = {};
  methods.forEach(m => methodCounts[m] = logs.filter(l => l.method === m).length);
  const total = logs.length;
  if (head) head.textContent = total + ' 筆';
  wrap.innerHTML = total === 0 ? `<div class="dash-empty">此區間無聯繫紀錄</div>` :
    methods.map(m => {
      const cnt = methodCounts[m];
      const pct = total ? Math.round(cnt/total*100) : 0;
      return `
      <div class="method-row ${cnt>0?'clickable':''}" onclick="${cnt>0?('showMethodList(\''+m+'\',\''+statsFrom+'\',\''+statsTo+'\')'):''}">  
        <div class="method-left">
          <span class="method-icon">${METHOD_ICONS[m]}</span>
          <span class="method-name">${m}</span>

        <div class="method-bar-wrap">
          <div class="method-bar" style="width:${pct}%;background:${cnt>0?'var(--accent)':'var(--border)'}"></div>
        </div>
        <div class="method-right">
          <span class="method-cnt" style="color:${cnt>0?'var(--accent)':'var(--text3)'}">${cnt}</span>
          ${cnt>0?'<span class="method-arrow">→</span>':''}
        </div>
      </div>`;
    }).join('');
}

const LEVEL_BG    = { L0:'#F0F0F0', L1:'#E8EDE4', L2:'#E0EEF8', L3:'#FDF0D8', L4:'#E4F2DC', L5:'#EDE8F8' };
const METHOD_ICONS = { '電話':'📞', 'LINE':'💬', 'MAIL':'✉️', '實體':'🤝', '視訊':'🎥' };

function getAllLogsThisMonth() {
  const now = new Date();
  const yr = now.getFullYear(), mo = now.getMonth()+1;
  const prefix = `${yr}-${String(mo).padStart(2,'0')}`;
  const all = [];
  DB.customers.forEach(c => c.logs.forEach(l => { if(l.date.startsWith(prefix)) all.push({...l,company:c.company,custId:c.id,type:'customer'}); }));
  DB.partners.forEach(p => p.logs.forEach(l => { if(l.date.startsWith(prefix)) all.push({...l,company:p.company,partId:p.id,type:'partner'}); }));
  return all;
}

function getLogsInRange(from, to) {
  const all = [];
  DB.customers.forEach(c => c.logs.forEach(l => { if(l.date >= from && l.date <= to) all.push({...l,company:c.company,custId:c.id,type:'customer'}); }));
  DB.partners.forEach(p => p.logs.forEach(l => { if(l.date >= from && l.date <= to) all.push({...l,company:p.company,partId:p.id,type:'partner'}); }));
  return all;
}

function getTrackingLogs() {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);
  const result = { pending:[], overdue:[] };
  DB.customers.forEach(c => c.logs.forEach(l => {
    if (l.track === '追蹤') result.pending.push({...l, company:c.company, custId:c.id});
    if (l.track === '指定追蹤日' && l.trackDate) {
      if (l.trackDate < todayStr) result.overdue.push({...l, company:c.company, custId:c.id});
      else result.pending.push({...l, company:c.company, custId:c.id});
    }
  }));
  return result;
}

function removeTracking(custId, logId) {
  const c = DB.customers.find(x => x.id === custId);
  if (!c) return;
  const l = c.logs.find(x => x.id === logId);
  if (l) { l.track = '不追蹤'; l.trackDate = ''; }
  renderDashboard();
}

  const label = from === to ? fmtDate(from) : `${fmtDate(from)} ～ ${fmtDate(to)}`;

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderDashboard(); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderDashboard(); }
function calToday() { const n=new Date(); calYear=n.getFullYear(); calMonth=n.getMonth(); renderDashboard(); }

function renderCal() {
  const grid = document.getElementById('cal-grid');
  if (!grid) return;
  const dows = ['日','一','二','三','四','五','六'];
  const now = new Date();
  
  const logsByDate = {};
  const allLogs = [];
  DB.customers.forEach(c => c.logs.forEach(l => allLogs.push({...l, company:c.company, custId:c.id, type:'customer'})));
  DB.partners.forEach(p => p.logs.forEach(l => allLogs.push({...l, company:p.company, partId:p.id, type:'partner'})));
  allLogs.forEach(l => {
    const d = l.date;
    if (!logsByDate[d]) logsByDate[d] = [];
    logsByDate[d].push(l);
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  for (let i = 0; i < firstDay; i++) {
    const d = prevDays - firstDay + 1 + i;
    html += `<div class="cal-day other-month"><span>${d}</span></div>`;
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = calYear===now.getFullYear() && calMonth===now.getMonth() && d===now.getDate();
    const logs = logsByDate[dateStr] || [];
    html += `<div class="cal-day ${isToday?'today':''}" onclick="showCalDay('${dateStr}')">
      <span>${d}</span>
      ${logs.length ? `<div class="cal-dot" title="${logs.length}筆聯繫紀錄">${logs.length}</div>` : ''}
    </div>`;
  }
  const total = firstDay + daysInMonth;
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i=1; i<=rem; i++) html += `<div class="cal-day other-month"><span>${i}</span></div>`;
  
  grid.innerHTML = html;
}

function showCalDay(dateStr) {
  const allLogs = [];
  DB.customers.forEach(c => c.logs.forEach(l => {
    if(l.date===dateStr) allLogs.push({...l, company:c.company, custId:c.id, type:'customer'});
  }));
  DB.partners.forEach(p => p.logs.forEach(l => {
    if(l.date===dateStr) allLogs.push({...l, company:p.company, partId:p.id, type:'partner'});

      <td>${methodBadge(l.method)}</td>

      <tbody>${rows}</tbody>
    </table>`
  );
}

let custDetailId = null;
let custPage = 0; // current page index (0-based)
const CUST_PAGE_SIZE = 20;

// Search filter state
const _CF = {
  keyword: '',
  industry: '',
  level: '',
  owner: '',
  source: '',
  si: '',
  pcscale: '',
  region: '',
  hasContact: '',
  listed: '',
  blocked: '',
  hasTracking: '',
  showAdvanced: false,
};

// Column sort state: key = column, value = 'asc' | 'desc' | ''
const _SORT = { level:'', industry:'', region:'', logs:'' };

function trunc(str, n) {
  if (!str) return '';
  return str.length > n ? str.slice(0, n) + '…' : str;
}

function getRegion(c) {
  // Extract first 3 Chinese characters from address
  const addr = c.address || '';
  const chinese = addr.match(/[一-鿿㐀-䶿]/g) || [];
  return chinese.slice(0,3).join('');
}

function custHasTracking(c) {
  return c.logs.some(l => l.track === '追蹤' || l.track === '指定追蹤日');
}

function custKeywordMatch(c, kw) {
  if (!kw) return true;
  const k = kw.toLowerCase();
  const fields = [
    c.company, c.phone||'', c.address||'', c.taxid||'',
    c.si||'', c.notes||'', c.owner||'', c.source||'', c.sourceNote||'',
    c.industryDetail||'', c.pcscale||'',
    ...c.contacts.map(ct => [ct.name,ct.dept,ct.mail,ct.job,ct.ext].join(' ')),
    ...c.logs.map(l => l.content||''),
  ].join(' ').toLowerCase();
  return fields.includes(k);
}

function applyCustFilter(list) {
  return list.filter(c => {
    if (!custKeywordMatch(c, _CF.keyword)) return false;
    if (_CF.industry) {
      if (['製造業','高科技/半導體','醫療生技','食品業','服務業'].includes(_CF.industry)) {
        if (c.industry !== 'corp' || c.industryDetail !== _CF.industry) return false;
      } else if (_CF.industry === 'corp') {
        if (c.industry !== 'corp') return false;
      } else {
        if (c.industry !== _CF.industry) return false;
      }
    }
    if (_CF.level  && c.level  !== _CF.level)  return false;
    if (_CF.owner  && c.owner  !== _CF.owner)  return false;
    if (_CF.source && c.source !== _CF.source) return false;
    if (_CF.si && (c.si||'') !== _CF.si) return false;
    if (_CF.pcscale && c.pcscale !== _CF.pcscale) return false;
    if (_CF.region && getRegion(c) !== _CF.region) return false;
    if (_CF.listed === 'yes' && !c.listed) return false;
    if (_CF.listed === 'no'  &&  c.listed) return false;
    if (_CF.blocked === 'yes' && !c.blocked) return false;
    if (_CF.blocked === 'no'  &&  c.blocked) return false;
    if (_CF.hasContact === 'yes') {
      if (!c.contacts.find(ct => ct.name && ct.name !== '尚無')) return false;
    }
    if (_CF.hasContact === 'no') {
      if (c.contacts.find(ct => ct.name && ct.name !== '尚無')) return false;
    }
    if (_CF.hasTracking === 'yes' && !custHasTracking(c)) return false;
    if (_CF.hasTracking === 'no'  &&  custHasTracking(c)) return false;
    return true;
  });
}

function activeFilterCount() {
  return Object.entries(_CF)
    .filter(([k,v]) => k !== 'showAdvanced' && v !== '')
    .length;
}

  const cur = _SORT[col];
  _SORT[col] = cur === '' ? 'asc' : cur === 'asc' ? 'desc' : '';

}

  const v = _SORT[col];
  if (v === 'asc')  return '<span style="color:var(--accent);margin-left:3px;">↑</span>';
  if (v === 'desc') return '<span style="color:var(--accent);margin-left:3px;">↓</span>';
  return '<span style="color:var(--text3);margin-left:3px;font-size:10px;">⇅</span>';
}

function renderCustList() {
  const LEVEL_ORDER = ['L5','L4','L3','L2','L1','L0'];
  const LEVEL_ORDER_ASC = ['L0','L1','L2','L3','L4','L5'];
  const industryLabel = { gov:'政府', medical:'醫療', edu:'教育', corp:'企業', npo:'財團法人' };
  const owners = ['無','Sara','Amber','Iris','大世科','其它'];

  // 1. base sort: address descending (z→a), no address goes last
  let list = [...DB.customers].sort((a,b) => {
    const aa = a.address||'', ba = b.address||'';
    if (!aa && !ba) return 0;
    if (!aa) return 1;
    if (!ba) return -1;
    return ba.localeCompare(aa, 'zh');
  });

  // 2. apply filters
  list = applyCustFilter(list);

  // 3. apply column sorts (last clicked wins, stable)
  if (_SORT.level) {
    list.sort((a,b) => {
      const ai = LEVEL_ORDER_ASC.indexOf(a.level);
      const bi = LEVEL_ORDER_ASC.indexOf(b.level);
      return _SORT.level === 'asc' ? ai - bi : bi - ai;
    });
  }
  if (_SORT.industry) {
    list.sort((a,b) => {
      const al = (industryLabel[a.industry]||'') + (a.industryDetail||'');
      const bl = (industryLabel[b.industry]||'') + (b.industryDetail||'');
      return _SORT.industry === 'asc' ? al.localeCompare(bl,'zh') : bl.localeCompare(al,'zh');
    });
  }
  if (_SORT.region) {
    list.sort((a,b) => {
      const ar = getRegion(a);
      const br = getRegion(b);
      return _SORT.region === 'asc' ? ar.localeCompare(br,'zh') : br.localeCompare(ar,'zh');
    });
  }
  if (_SORT.logs) {
    list.sort((a,b) => _SORT.logs === 'asc' ? a.logs.length - b.logs.length : b.logs.length - a.logs.length);
  }

  const cnt = activeFilterCount();
  const adv = _CF.showAdvanced;
  const regions = [...new Set(DB.customers.map(c=>getRegion(c)).filter(v=>v))].sort((a,b)=>a.localeCompare(b,'zh'));

  return `
  <div class="cust-search-panel">
    <div class="cust-search-row" style="margin-bottom:${adv?'10px':'0'}">
      <div class="search-box" style="max-width:none;flex:1">
        <span>🔍</span>
        <input placeholder="搜尋任何關鍵字（公司、電話、統編、地址、聯繫人、備註…）"
          id="cust-kw-input" oninput="if(!_imeActive){_CF.keyword=this.value;refreshCustList()}"
          oncompositionend="_CF.keyword=this.value;refreshCustList()"
          value="${_CF.keyword}" style="min-width:0">
      </div>
      <button class="adv-toggle-btn ${adv?'active':''}" onclick="_CF.showAdvanced=!_CF.showAdvanced;refreshCustList()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        篩選條件
        ${cnt > 0 ? `<span class="adv-badge">${cnt}</span>` : ''}
      </button>
      ${cnt > 0 ? `<button class="btn btn-ghost btn-sm" onclick="clearCustFilters()" style="white-space:nowrap;flex-shrink:0">✕ 清除全部</button>` : ''}
    </div>

    ${adv ? `
    <div class="adv-filter-grid">
      <div class="adv-filter-group">
        <div class="adv-filter-label">產業類別</div>
        <select class="form-control adv-sel" onchange="_CF.industry=this.value;refreshCustList()">
          <option value="">全部</option>
          <option value="gov"          ${_CF.industry==='gov'?'selected':''}>政府</option>
          <option value="medical"      ${_CF.industry==='medical'?'selected':''}>醫療</option>
          <option value="edu"          ${_CF.industry==='edu'?'selected':''}>教育</option>
          <option value="npo"          ${_CF.industry==='npo'?'selected':''}>財團法人</option>
          <option value="corp"         ${_CF.industry==='corp'?'selected':''}>企業（全部）</option>
          <option value="製造業"       ${_CF.industry==='製造業'?'selected':''}>　└ 製造業</option>
          <option value="高科技/半導體" ${_CF.industry==='高科技/半導體'?'selected':''}>　└ 高科技/半導體</option>
          <option value="醫療生技"     ${_CF.industry==='醫療生技'?'selected':''}>　└ 醫療生技</option>
          <option value="食品業"       ${_CF.industry==='食品業'?'selected':''}>　└ 食品業</option>
          <option value="服務業"       ${_CF.industry==='服務業'?'selected':''}>　└ 服務業</option>
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">等級</div>
        <select class="form-control adv-sel" onchange="_CF.level=this.value;refreshCustList()">
          <option value="">全部</option>
          <option value="L0" ${_CF.level==='L0'?'selected':''}>L0 - 公司客戶(非負責)</option>
          <option value="L1" ${_CF.level==='L1'?'selected':''}>L1 - 陌生</option>
          <option value="L2" ${_CF.level==='L2'?'selected':''}>L2 - 拜訪過</option>
          <option value="L3" ${_CF.level==='L3'?'selected':''}>L3 - 有詢價</option>
          <option value="L4" ${_CF.level==='L4'?'selected':''}>L4 - 有成交過</option>
          <option value="L5" ${_CF.level==='L5'?'selected':''}>L5 - 穩定熟客</option>
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">地區</div>
        <select class="form-control adv-sel" onchange="_CF.region=this.value;refreshCustList()">
          <option value="">全部</option>
          ${regions.map(v=>`<option value="${v}" ${_CF.region===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">公司負責業務</div>
        <select class="form-control adv-sel" onchange="_CF.owner=this.value;refreshCustList()">
          <option value="">全部</option>
          ${owners.map(v=>`<option value="${v}" ${_CF.owner===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">資訊來源</div>
        <select class="form-control adv-sel" onchange="_CF.source=this.value;refreshCustList()">
          <option value="">全部</option>
          <option value="陌生開發" ${_CF.source==='陌生開發'?'selected':''}>陌生開發</option>
          <option value="內部提供" ${_CF.source==='內部提供'?'selected':''}>內部提供</option>
          <option value="協力廠商" ${_CF.source==='協力廠商'?'selected':''}>協力廠商</option>
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">PC 數規模</div>
        <select class="form-control adv-sel" onchange="_CF.pcscale=this.value;refreshCustList()">
          <option value="">全部</option>
          <option value="50台以下"  ${_CF.pcscale==='50台以下'?'selected':''}>50台以下</option>
          <option value="200台以下" ${_CF.pcscale==='200台以下'?'selected':''}>200台以下</option>
          <option value="300台以下" ${_CF.pcscale==='300台以下'?'selected':''}>300台以下</option>
          <option value="300台以上" ${_CF.pcscale==='300台以上'?'selected':''}>300台以上</option>
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">長期配合 SI</div>
        <select class="form-control adv-sel" onchange="_CF.si=this.value;refreshCustList()">
          <option value="">全部</option>
          ${[...new Set(DB.customers.map(c=>c.si||'').filter(v=>v.trim()))].sort().map(v=>`<option value="${v}" ${_CF.si===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">上市櫃</div>
        <div class="adv-radio-row">
          ${[['','全部'],['yes','是'],['no','否']].map(([v,l])=>`
            <label class="adv-radio ${_CF.listed===v?'active':''}">
              <input type="radio" name="f-listed" value="${v}" ${_CF.listed===v?'checked':''}
                onchange="_CF.listed='${v}';refreshCustList()"> ${l}
            </label>`).join('')}
        </div>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">總機擋下</div>
        <div class="adv-radio-row">
          ${[['','全部'],['yes','是'],['no','否']].map(([v,l])=>`
            <label class="adv-radio ${_CF.blocked===v?'active':''}">
              <input type="radio" name="f-blocked" value="${v}" ${_CF.blocked===v?'checked':''}
                onchange="_CF.blocked='${v}';refreshCustList()"> ${l}
            </label>`).join('')}
        </div>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">有聯繫人</div>
        <div class="adv-radio-row">
          ${[['','全部'],['yes','有'],['no','無']].map(([v,l])=>`
            <label class="adv-radio ${_CF.hasContact===v?'active':''}">
              <input type="radio" name="f-contact" value="${v}" ${_CF.hasContact===v?'checked':''}
                onchange="_CF.hasContact='${v}';refreshCustList()"> ${l}
            </label>`).join('')}
        </div>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">待追蹤</div>
        <div class="adv-radio-row">
          ${[['','全部'],['yes','有'],['no','無']].map(([v,l])=>`
            <label class="adv-radio ${_CF.hasTracking===v?'active':''}">
              <input type="radio" name="f-tracking" value="${v}" ${_CF.hasTracking===v?'checked':''}
                onchange="_CF.hasTracking='${v}';refreshCustList()"> ${l}
            </label>`).join('')}
        </div>
      </div>
    </div>` : ''}
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <h3>客戶列表
        <span style="font-size:12px;font-weight:400;color:var(--text3);margin-left:8px;">
          ${list.length} / ${DB.customers.length} 筆
          ${cnt > 0 ? `<span style="color:var(--accent-sun);font-weight:600;">（${cnt} 項篩選）</span>` : ''}
        </span>
      </h3>
    </div>
    ${list.length === 0 ? `<div class="empty"><div class="empty-icon">🔍</div><p>無符合條件的客戶</p></div>` : (() => {
      const totalPages = Math.ceil(list.length / CUST_PAGE_SIZE);
      if (custPage >= totalPages) custPage = totalPages - 1;
      const pageList = list.slice(custPage * CUST_PAGE_SIZE, (custPage + 1) * CUST_PAGE_SIZE);
      const from = custPage * CUST_PAGE_SIZE + 1;
      const to = Math.min((custPage + 1) * CUST_PAGE_SIZE, list.length);

      return `
    <table>
      <thead><tr>
        <th>公司名稱</th>
        <th>聯繫人</th>
        <th class="sort-th" onclick="cycleSortCol('level')">等級${sortIcon('level')}</th>
        <th class="sort-th" onclick="cycleSortCol('industry')">產業${sortIcon('industry')}</th>
        <th class="sort-th" onclick="cycleSortCol('region')">地區${sortIcon('region')}</th>
        <th class="sort-th" onclick="cycleSortCol('logs')">聯繫紀錄${sortIcon('logs')}</th>
      </tr></thead>
      <tbody>
        ${pageList.map(c => {
          const primary = c.contacts?.find(ct => ct.primary) || c.contacts?.[0];
          const hasContact = primary?.name && primary.name !== '尚無';
          return `
          <tr class="tr-clickable" onclick="openCustomerDetail(${c.id})">
            <td style="max-width:140px;">
              <div style="display:flex;align-items:center;gap:5px;">
                <strong style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${c.company}">${trunc(c.company,6)}</strong>
                ${c.listed ? '<span class="listed-badge">上市</span>' : ''}
                ${c.level==='L1'&&c.blocked ? '<span class="tag" style="color:var(--red);font-size:10px;">擋</span>' : ''}
                ${custHasTracking(c) ? '<span style="font-size:11px;" title="有待追蹤">📌</span>' : ''}
              </div>
            </td>
            <td>${hasContact ? `<span title="${primary.name}">${trunc(primary.name,4)}</span>` : '<span style="color:var(--text3);font-size:11px;">尚無</span>'}</td>
            <td><span class="badge badge-${c.level.toLowerCase()}" style="letter-spacing:0.03em">${c.level}</span></td>
            <td><span style="font-size:12px">${industryLabel[c.industry]||'-'}</span></td>
            <td style="font-size:12px;color:var(--text2)">${getRegion(c)||'<span style=\"color:var(--text3)\">-</span>'}</td>
            <td>${c.logs.length > 0 ? `<span class="log-count-badge">${c.logs.length}</span>` : '<span style="color:var(--text3);font-size:12px">-</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${totalPages > 1 ? `
    <div class="pagination-bar">
      <span class="page-info">${from}–${to} / ${list.length} 筆</span>
      <div class="page-btns">
        <button class="page-btn" ${custPage===0?'disabled':''} onclick="custPage=0;refreshCustListNoReset()">«</button>
        <button class="page-btn" ${custPage===0?'disabled':''} onclick="custPage--;refreshCustListNoReset()">‹</button>
        ${Array.from({length:totalPages},(_,i)=>`
          <button class="page-btn ${i===custPage?'active':''}" onclick="custPage=${i};refreshCustListNoReset()">${i+1}</button>
        `).join('')}
        <button class="page-btn" ${custPage===totalPages-1?'disabled':''} onclick="custPage++;refreshCustListNoReset()">›</button>
        <button class="page-btn" ${custPage===totalPages-1?'disabled':''} onclick="custPage=${totalPages-1};refreshCustListNoReset()">»</button>
      </div>
    </div>` : ''}`;
    })()}
  </div>`;
}

function refreshCustList() {
  custPage = 0;
  _refreshWithFocus('cust-content', renderCustList, 'cust-kw-input');
}

function refreshCustListNoReset() {
  _refreshWithFocus('cust-content', renderCustList, 'cust-kw-input');
}

function clearCustFilters() {
  Object.keys(_CF).forEach(k => { if (k !== 'showAdvanced') _CF[k] = ''; });
  refreshCustList();
}

function openCustomerDetail(id) {
  const c = DB.customers.find(x => x.id === id);
  if (!c) return;
  showCustomerViewModal(c);
}

function showCustomerViewModal(c) {
  const industryLabel = { gov:'政府', medical:'醫療', edu:'教育', corp:'企業', npo:'財團法人' };

  // Build contacts section
  const contactsHtml = (() => {
    const valid = c.contacts.filter(ct => ct.name && ct.name !== '尚無');
    if (!valid.length) return '<div style="color:var(--text3);font-size:13px;">尚無聯繫人</div>';
    return valid.map((ct,i) => `
      <div class="contact-item" style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          ${ct.primary ? '<span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-glow);border:1px solid var(--border2);padding:1px 7px;border-radius:4px;">★ 主要</span>' : `<span style="font-size:10px;font-weight:700;color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:1px 7px;border-radius:4px;">${i+1}</span>`}
          <strong style="font-size:13px">${ct.name}</strong>
          ${ct.dept ? `<span style="font-size:11px;color:var(--text3)">${ct.dept}</span>` : ''}
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.9;padding-left:2px;">
          ${ct.job ? `${ct.job}<br>` : ''}
          ${ct.ext ? `分機：${ct.ext}　` : ''}${ct.mail ? `<a href="mailto:${ct.mail}" style="color:var(--accent)">${ct.mail}</a>` : ''}
        </div>
      </div>`).join('');
  })();

  // Build info grid (view mode)
  function infoRow(label, val) {
    if (val === null || val === undefined || val === '' || val === '-') return '';
    return `<div class="vd-row"><div class="vd-key">${label}</div><div class="vd-val">${val}</div></div>`;
  }

  const modalHtml = `
  <div class="vd-wrap">
    <!-- LEFT: info + contacts -->
    <div class="vd-left">
      <!-- Company header -->
      <div class="vd-company-head">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <h2 style="font-size:17px;font-weight:800;color:var(--text)">${c.company}</h2>
            ${c.listed ? '<span class="listed-badge">上市櫃</span>' : ''}
            ${c.level==='L1'&&c.blocked ? '<span class="tag" style="color:var(--red)">總機擋</span>' : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;">
            ${levelBadge(c.level)}
            ${industryBadge(c.industry)}
            ${c.industryDetail ? `<span class="tag">${c.industryDetail}</span>` : ''}
            ${getRegion(c) ? `<span class="tag">📍 ${getRegion(c)}</span>` : ''}
          </div>
        </div>
      </div>

      <!-- Company info -->
      <div class="vd-section">
        <div class="vd-section-title">公司資訊</div>
        ${infoRow('電話', c.phone)}
        ${infoRow('公司地址', c.address)}
        ${c.taxid ? infoRow('統一編號', `<span style="font-family:monospace;letter-spacing:0.1em">${c.taxid}</span>`) : ''}
        ${infoRow('上市櫃', c.listed ? '<span class="listed-badge">是</span>' : '否')}
        ${c.level==='L1' ? infoRow('總機擋下', c.blocked ? '<span style="color:var(--red);font-weight:600">是</span>' : '否') : ''}
        ${infoRow('長期配合SI', c.si)}
        ${infoRow('PC 數規模', c.pcscale ? `<span class="tag">${c.pcscale}</span>` : '')}
      </div>

      <!-- Contacts -->
      <div class="vd-section">
        <div class="vd-section-title">聯繫人</div>
        ${contactsHtml}
      </div>

      <!-- Business info -->
      <div class="vd-section">
        <div class="vd-section-title">業務資訊</div>
        ${infoRow('公司負責業務', c.owner)}
        ${infoRow('資訊來源', `<span class="tag">${c.source||'-'}</span>${c.sourceNote ? ` <span style="font-size:12px;color:var(--text2)">— ${c.sourceNote}</span>` : ''}`)}
        ${infoRow('其它背景資訊', c.notes ? `<div style="white-space:pre-wrap;line-height:1.6;font-size:12px;color:var(--text2)">${c.notes}</div>` : '')}
      </div>
    </div>

    <!-- RIGHT: logs -->
    <div class="vd-right" id="vd-logs-panel-${c.id}">
      ${renderLogsPanel(c)}
    </div>
  </div>`;

  // Open wide modal
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = `overlay-viewcust-${c.id}`;
  overlay.innerHTML = `
    <div class="modal" style="max-width:900px;">
      <div class="modal-head" style="border-radius:14px 14px 0 0;">
        <h2 style="font-size:15px">${c.company}</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-ghost btn-sm" onclick="closeViewModal(${c.id});openEditCustomer(${c.id})">✏️ 編輯資料</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--red)" onclick="deleteCustomer(${c.id})">🗑 刪除</button>
          <button class="modal-close" onclick="closeViewModal(${c.id})">✕</button>
        </div>
      </div>
      <div class="modal-body" style="padding:0;max-height:80vh;overflow-y:auto;">
        ${modalHtml}
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeViewModal(c.id); });
  document.body.appendChild(overlay);
}

function closeViewModal(id) {
  const el = document.getElementById(`overlay-viewcust-${id}`);
  if (el) el.remove();
}

function refreshViewModal(custId) {
  const c = DB.customers.find(x => x.id === custId);
  if (!c) return;
  const panel = document.getElementById(`vd-logs-panel-${custId}`);
  if (panel) panel.innerHTML = renderLogsPanel(c);
}

function renderLogsPanel(c) {
  return `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:0 0 12px;border-bottom:1.5px solid var(--border);margin-bottom:4px;">
      <div style="font-size:13px;font-weight:700;color:var(--text)">
        聯繫紀錄 <span style="color:var(--accent);font-size:12px;margin-left:4px;">${c.logs.length}</span>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openLogForm(${c.id},null)">＋ 新增紀錄</button>
    </div>
    ${c.logs.length === 0
      ? '<div style="text-align:center;padding:32px 0;color:var(--text3);font-size:13px;">尚無聯繫紀錄</div>'
      : c.logs.slice().reverse().map(l => `
        <div class="vd-log-item">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="log-date">${fmtDate(l.date)}</span>
              ${methodBadge(l.method)}
              ${l.track&&l.track!=='不追蹤' ? `<span style="font-size:11px;color:var(--orange)">📌 ${l.track==='指定追蹤日'&&l.trackDate?fmtDate(l.trackDate):'追蹤中'}</span>` : ''}
            </div>
            <button class="log-edit-btn" onclick="openLogForm(${c.id},${l.id})" title="編輯此紀錄">✏️</button>
          </div>
          <div class="log-content">${l.content}</div>
        </div>`).join('')}`;
}

// Unified log form: new (logId=null) or edit (logId=number)
function openLogForm(custId, logId) {
  const c = DB.customers.find(x => x.id === custId);
  if (!c) return;
  const existing = logId !== null ? c.logs.find(l => l.id === logId) : null;
  const today = new Date().toISOString().slice(0,10);
  const isEdit = !!existing;

  openModal('logFormModal', isEdit ? '編輯聯繫紀錄' : '新增聯繫紀錄', `
    <div class="form-grid">
      <div class="form-group"><label>日期</label>
        <input id="lf-date" class="form-control" type="date" value="${existing?.date||today}">
      </div>
      <div class="form-group"><label>聯繫方式</label>
        <select id="lf-method" class="form-control">
          ${['電話','LINE','MAIL','實體','視訊'].map(v=>`<option ${(existing?.method||'電話')===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group form-full"><label>聯繫內容</label>
        <textarea id="lf-content" class="form-control" rows="4" placeholder="記錄本次聯繫的重點內容…">${existing?.content||''}</textarea>
      </div>
      <div class="form-group"><label>追蹤設定</label>
        <select id="lf-track" class="form-control" onchange="toggleTrackDate()">
          <option value="不追蹤" ${(existing?.track||'不追蹤')==='不追蹤'?'selected':''}>不追蹤</option>
          <option value="追蹤"   ${existing?.track==='追蹤'?'selected':''}>追蹤</option>
          <option value="指定追蹤日" ${existing?.track==='指定追蹤日'?'selected':''}>指定追蹤日</option>
        </select>
      </div>
      <div class="form-group" id="lf-trackdate-wrap" style="${existing?.track==='指定追蹤日'?'':'display:none'}">
        <label>追蹤日期</label>
        <input id="lf-trackdate" class="form-control" type="date" value="${existing?.trackDate||''}">
      </div>
    </div>
  `, () => {
    const content = document.getElementById('lf-content').value.trim();
    if (!content) { alert('請填寫聯繫內容'); return false; }
    const logData = {
      id: isEdit ? existing.id : DB.nextLogId++,
      date: document.getElementById('lf-date').value,
      method: document.getElementById('lf-method').value,
      content,
      track: document.getElementById('lf-track').value,
      trackDate: document.getElementById('lf-trackdate')?.value || '',
    };
    if (isEdit) {
      const idx = c.logs.findIndex(l => l.id === logId);
      if (idx >= 0) c.logs[idx] = logData;
      toast('✅ 聯繫紀錄已更新');
    } else {
      c.logs.push(logData);
      toast('✅ 聯繫紀錄已新增');
    }
    sbUpdateCustLogs(custId, c.logs).catch(e => toast('⚠ 同步失敗：' + e.message));
    refreshViewModal(custId);
    renderPage(currentPage);
    return true;
  });
}

function onPrimaryChange(idx) {
  const wrap = document.getElementById('cf-contacts-wrap');
  if (!wrap) return;
  wrap.querySelectorAll('.contact-row').forEach((row, i) => {
    const isPri = (i === idx);
    row.style.borderColor = isPri ? 'var(--accent)' : 'var(--border)';
    row.style.background   = isPri ? 'var(--accent-glow)' : 'var(--surface2)';
    const lbl = document.getElementById('ct-primary-lbl-'+i);
    if (lbl) lbl.style.color = isPri ? 'var(--accent)' : 'var(--text3)';
  });
}

function addContactRow() {
  const wrap = document.getElementById('cf-contacts-wrap');
  if (!wrap) return;
  const idx = wrap.querySelectorAll('.contact-row').length;
  const div = document.createElement('div');
  div.innerHTML = buildContactRow({}, idx, false);
  wrap.appendChild(div.firstElementChild);
}

function removeContactRow(i) {
  const row = document.getElementById('ct-row-'+i);
  const wasPrimary = row?.querySelector('.ct-primary')?.checked || false;
  if (row) row.remove();
  // Re-index all rows
  const wrap = document.getElementById('cf-contacts-wrap');
  if (!wrap) return;
  wrap.querySelectorAll('.contact-row').forEach((r, idx) => {
    r.id = 'ct-row-'+idx;
    const lbl = r.querySelector('span[id^="ct-primary-lbl-"]');
    if (lbl) lbl.id = 'ct-primary-lbl-'+idx;
    const radio = r.querySelector('.ct-primary');
    if (radio) { radio.value = idx; radio.setAttribute('onchange',`onPrimaryChange(${idx})`); }
    const hdlbl = r.querySelector('span[style*="font-size:11px;font-weight:700"]');
    if (hdlbl) hdlbl.textContent = `聯繫人 ${idx+1}`;
    const delBtn = r.querySelector('.contact-row-del');
    if (delBtn) {
      if (idx === 0) delBtn.remove();
      else delBtn.setAttribute('onclick', `removeContactRow(${idx})`);
    }
  });
  // If removed row was primary, assign primary to first
  if (wasPrimary) {
    const firstRadio = wrap.querySelector('.ct-primary');
    if (firstRadio) { firstRadio.checked = true; onPrimaryChange(0); }
  }
}

function getContactsFromForm() {
  const wrap = document.getElementById('cf-contacts-wrap');
  if (!wrap) return [{name:'尚無',dept:'',ext:'',mail:'',job:'',primary:true}];
  const rows = wrap.querySelectorAll('.contact-row');
  const result = [];
  rows.forEach((row, i) => {
    const name = row.querySelector('.ct-name')?.value.trim() || '';
    const dept = row.querySelector('.ct-dept')?.value.trim() || '';
    const ext  = row.querySelector('.ct-ext')?.value.trim() || '';
    const mail = row.querySelector('.ct-mail')?.value.trim() || '';
    const job  = row.querySelector('.ct-job')?.value.trim() || '';
    const prim = row.querySelector('.ct-primary')?.checked || false;
    result.push({ name: name || '尚無', dept, ext, mail, job, primary: prim });
  });
  // ensure at least one primary
  if (result.length && !result.some(r => r.primary)) result[0].primary = true;
  return result.length ? result : [{name:'尚無',dept:'',ext:'',mail:'',job:'',primary:true}];
}

async function lookupCompanyInfo() {
  const company = document.getElementById('cf-company')?.value.trim();
  if (!company) { toast('⚠ 請先填寫公司名稱'); return; }

  const btn = document.getElementById('cf-lookup-btn');
  const status = document.getElementById('cf-lookup-status');
  btn.disabled = true;
  btn.innerHTML = `<span class="ai-spinner"></span> 查詢中…`;
  status.textContent = '';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `請幫我查詢台灣公司「${company}」的以下公開資訊，並只回傳 JSON 格式（不加 markdown），格式如下：
{"address":"完整公司地址","taxid":"8碼統一編號","found":true}
如果查不到某欄位，該欄位填空字串。如果完全找不到這家公司，回傳 {"found":false,"address":"","taxid":""}。
只回傳 JSON，不要其他文字。`
        }]
      })
    });

    const data = await response.json();
    // Extract text from response (may include tool_use blocks)
    const textBlock = data.content?.find(b => b.type === 'text');
    const raw = textBlock?.text || '';

    // Parse JSON - strip any markdown fences
    const clean = raw.replace(/```json|```/g,'').trim();
    let result;
    try { result = JSON.parse(clean); } catch(e) {
      // Try to extract JSON from text
      const m = clean.match(/\{[\s\S]*\}/);
      result = m ? JSON.parse(m[0]) : null;
    }

    if (!result || result.found === false) {
      status.textContent = '⚠ 查無此公司公開資料，請手動填寫';
      status.style.color = 'var(--orange)';
    } else {
      let filled = [];
      if (result.address) {
        document.getElementById('cf-address').value = result.address;
        filled.push('地址');
      }
      if (result.taxid) {
        document.getElementById('cf-taxid').value = result.taxid;
        filled.push('統一編號');
      }
      if (filled.length) {
        status.textContent = `✅ 已填入：${filled.join('、')}`;
        status.style.color = 'var(--green)';
      } else {
        status.textContent = '查到公司但無地址/統編資料，請手動填寫';
        status.style.color = 'var(--orange)';
      }
    }
  } catch(err) {
    status.textContent = '網路錯誤，請稍後再試';
    status.style.color = 'var(--red)';
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> 自動查詢公開資訊`;
  }
}

function saveCustomer(id, overwriteDupId) {
  const company = document.getElementById('cf-company').value.trim();
  if (!company) { alert('請輸入公司名稱'); return false; }

  const taxid = document.getElementById('cf-taxid')?.value.trim() || '';
  if (!taxid) {
    // Highlight the field
    const el = document.getElementById('cf-taxid');
    if (el) { el.style.borderColor = 'var(--red)'; el.focus(); el.placeholder = '※ 必填'; }
    toast('⚠ 統一編號為必填欄位');
    return false;
  }

  const ownerSel = document.getElementById('cf-owner').value;
  const ownerCustom = document.getElementById('cf-owner-custom')?.value.trim() || '';
  const ownerFinal = ownerSel === '其它' ? (ownerCustom || '其它') : ownerSel;

  const obj = {
    id: id || DB.nextCustId++,
    company,
    phone: document.getElementById('cf-phone').value,
    address: document.getElementById('cf-address')?.value || '',
    taxid,
    contacts: getContactsFromForm(),
    industry: document.getElementById('cf-industry').value,
    industryDetail: document.getElementById('cf-industryDetail')?.value || '',
    level: document.getElementById('cf-level').value,
    blocked: document.getElementById('cf-blocked')?.checked || false,
    owner: ownerFinal,
    ownerCustom: ownerSel === '其它' ? ownerCustom : '',
    source: document.getElementById('cf-source').value,
    sourceNote: document.getElementById('cf-source-note')?.value || '',
    si: document.getElementById('cf-si').value,
    pcscale: document.getElementById('cf-pcscale')?.value || '',
    notes: document.getElementById('cf-notes')?.value || '',
    listed: document.getElementById('cf-listed')?.checked || false,
    logs: id ? DB.customers.find(c => c.id===id)?.logs || [] : [],
  };

  // ── 編輯模式：直接儲存 ──
  if (id) {
    const idx = DB.customers.findIndex(c => c.id === id);
    DB.customers[idx] = obj;
    showLoadingOverlay('儲存中…');
    sbSaveCust(obj, true).then(() => {
      hideLoadingOverlay();
      toast('✅ 客戶資料已更新');
      setTimeout(() => showCustomerViewModal(DB.customers.find(c=>c.id===id)), 100);
    }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); });
    return true;
  }

  // ── 新增模式：檢查統編重複 ──
  const dup = DB.customers.find(c => c.taxid && c.taxid === taxid);

  if (dup && overwriteDupId !== dup.id) {
    // 有重複且尚未確認 → 顯示確認彈窗
    showDupTaxidModal(dup, obj);
    return false; // 暫停，等使用者選擇
  }

  if (dup && overwriteDupId === dup.id) {
    // 使用者選擇「移除舊的，儲存新的」
    sbDelete('customers', dup.id).catch(()=>{});
    DB.customers = DB.customers.filter(c => c.id !== dup.id);
  }

  DB.customers.push(obj);
  showLoadingOverlay('儲存中…');
  sbSaveCust(obj, false).then(() => {
    hideLoadingOverlay();
    toast('✅ 新增客戶成功');
    refreshCustList();
  }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); });
  return true;
}

          </div>
        </div>
        <p style="font-size:13px;color:var(--text2);margin-bottom:6px;">請選擇處理方式：</p>

              <div style="font-weight:700">保留舊資料</div>

function dupKeepOld() {
  // 關閉確認彈窗，重新開回客戶表單 (資料保留)
  document.getElementById('dup-taxid-overlay')?.remove();
  toast('已取消，保留舊資料');
}

function dupReplaceOld(dupId) {
  document.getElementById('dup-taxid-overlay')?.remove();
  const obj = window._pendingNewCust;
  if (!obj) return;
  sbDelete('customers', dupId).catch(()=>{});
  DB.customers = DB.customers.filter(c => c.id !== dupId);
  DB.customers.push(obj);
  window._pendingNewCust = null;
  closeModal('custModal');
  showLoadingOverlay('儲存中…');
  sbSaveCust(obj, false).then(() => {
    hideLoadingOverlay();
    toast('✅ 已移除舊資料，新增客戶成功');
    renderPage(currentPage);
  }).catch(e => { hideLoadingOverlay(); toast('❌ 儲存失敗：' + e.message); renderPage(currentPage); });
}


function toggleTrackDate() {
  const v = document.getElementById('lf-track').value;
  document.getElementById('lf-trackdate-wrap').style.display = v==='指定追蹤日' ? '' : 'none';
}

function saveLog(id, type) {
  const content = document.getElementById('lf-content').value.trim();
  if (!content) { alert('請填寫聯繫內容'); return false; }

  const log = {
    id: DB.nextLogId++,
    date: document.getElementById('lf-date').value,
    method: document.getElementById('lf-method').value,
    content,
    track: document.getElementById('lf-track').value,
    trackDate: document.getElementById('lf-trackdate')?.value || '',
  };

  if (type === 'customer') {
    const c = DB.customers.find(x => x.id === id);
    if (c) c.logs.push(log);
    toast('✅ 聯繫紀錄已新增');
  } else {
    const p = DB.partners.find(x => x.id === id);
    if (p) p.logs.push(log);
    toast('✅ 聯繫紀錄已新增');
  }
  return true;
}

function renderPartList() {

      (p.companyEn||'').toLowerCase().includes(kw) ||
      (p.contacts||[]).some(ct => (ct.name||'').toLowerCase().includes(kw)) ||

    );
  }
  if (_PF.category) list = list.filter(p => p.category === _PF.category);
  if (_PF.catKey)   list = list.filter(p => (p.brands||[]).some(b => b.catKey === _PF.catKey));
  if (_PF.sub)      list = list.filter(p => (p.brands||[]).some(b => b.subcat === _PF.sub));
  if (_PF.brand)    list = list.filter(p => (p.brands||[]).some(b => b.brand === _PF.brand));

  const hasFilter = Object.entries(_PF).some(([k,v])=>k!=='_showAdv'&&v!=='');

  const allCatKeys = [...new Set(DB.partners.flatMap(p=>(p.brands||[]).map(b=>b.catKey).filter(Boolean)))];

  const allBrands  = [...new Set(DB.partners.flatMap(p=>(p.brands||[]).map(b=>b.brand).filter(Boolean)))].sort((a,b)=>a.localeCompare(b,'zh'));

  return `
  <div class="cust-search-panel" style="margin-bottom:14px;">
    <div class="cust-search-row" style="margin-bottom:${adv?'10px':'0'}">
      <div class="search-box" style="max-width:none;flex:1">
        <span>🔍</span>
        <input placeholder="搜尋公司名稱、聯繫人、代理品牌…"
          id="part-kw-input" oninput="if(!_imeActive){_PF.keyword=this.value;refreshPartList()}" oncompositionend="_PF.keyword=this.value;refreshPartList()" value="${_PF.keyword}">
      </div>
      <button class="adv-toggle-btn ${adv?'active':''}" onclick="_PF._showAdv=!_PF._showAdv;refreshPartList()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
        篩選條件
        ${cnt > 0 ? `<span class="adv-badge">${cnt}</span>` : ''}
      </button>
      ${hasFilter ? `<button class="btn btn-ghost btn-sm" onclick="clearPartFilters()" style="white-space:nowrap;flex-shrink:0">✕ 清除</button>` : ''}
    </div>
    ${adv ? `
    <div class="adv-filter-grid" style="padding-top:10px;border-top:1px solid var(--border);">
      <div class="adv-filter-group">
        <div class="adv-filter-label">類別</div>
        <select class="form-control adv-sel" onchange="_PF.category=this.value;refreshPartList()">
          <option value="">全部</option>
          ${categories.map(c=>`<option value="${c}" ${_PF.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">產品類別</div>
        <select class="form-control adv-sel" onchange="_PF.catKey=this.value;refreshPartList()">
          <option value="">全部</option>
          ${allCatKeys.map(k=>`<option value="${k}" ${_PF.catKey===k?'selected':''}>${PROD_CATS[k]?.icon||''} ${PROD_CATS[k]?.label||k}</option>`).join('')}
        </select>
      </div>
      <div class="adv-filter-group">
        <div class="adv-filter-label">產品細項</div>
        <select class="form-control adv-sel" onchange="_PF.sub=this.value;refreshPartList()">
          <option value="">全部</option>
          ${allSubs.map(s=>`<option value="${s}" ${_PF.sub===s?'selected':''}>${s}</option>`).join('')}

          ${allBrands.map(b=>`<option value="${b}" ${_PF.brand===b?'selected':''}>${b}</option>`).join('')}

      <h3>合作窗口

              ).join('') || '<span style="color:var(--text3);font-size:11px;">尚無</span>'}
            </td>
            <td style="line-height:1.8">${brands.length ? brands.map(b=>`<span class="tag" style="font-size:11px">${b}</span>`).join(' ') : '<span style="color:var(--text3);font-size:12px">-</span>'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`}
  </div>`;
}

function showPartnerViewModal(p) {
  const brands = p.brands || [];
  const showBrandSection = ['代理商','原廠'].includes(p.category);

  // Brand display - hierarchical: cat > sub > brands
  const brandHtml = (() => {
    if (!brands.length) return '<div style="color:var(--text3);font-size:13px;">尚未設定代理品牌</div>';

    // Group: catLabel → subcat → [brands]
    const tree = {};
    brands.forEach(b => {
      const cat = b.catLabel || '其他';
      const sub = b.subcat || '';
      if (!tree[cat]) tree[cat] = {};
      if (!tree[cat][sub]) tree[cat][sub] = [];
      if (b.brand && !tree[cat][sub].includes(b.brand)) tree[cat][sub].push(b.brand);
    });

    return Object.entries(tree).map(([cat, subs]) => {
      const subsHtml = Object.entries(subs).map(([sub, brs]) => {
        const brandsHtml = brs.map(b =>
          `<span style="display:inline-flex;align-items:center;background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;margin:2px 4px 2px 0;">${b}</span>`
        ).join('');
        if (!sub) return brandsHtml;
        return `<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:4px 0 4px 12px;">
          <span style="font-size:12px;color:var(--text2);flex-shrink:0;">${sub}</span>
          <span style="color:var(--text3);font-size:11px;">›</span>
          <div style="display:flex;flex-wrap:wrap;gap:2px;">${brandsHtml}</div>
        </div>`;
      }).join('');

      return `<div style="margin-bottom:10px;">
        <div style="font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:0.05em;padding:3px 0;border-bottom:1px solid var(--border);margin-bottom:4px;">${cat}</div>
        ${subsHtml}
      </div>`;
    }).join('');
  })();

  // Contacts
  const contactsHtml = (() => {
    const valid = (p.contacts||[]).filter(ct => ct.name && ct.name !== '尚無');
    if (!valid.length) return '<div style="color:var(--text3);font-size:13px;">尚無聯繫人</div>';
    return valid.map((ct, i) => `
      <div class="contact-item" style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          ${ct.primary
            ? '<span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-glow);border:1px solid var(--border2);padding:1px 7px;border-radius:4px;">★ 主要窗口</span>'
            : `<span style="font-size:10px;font-weight:700;color:var(--text3);background:var(--surface2);border:1px solid var(--border);padding:1px 7px;border-radius:4px;">聯繫人 ${i+1}</span>`}
          <strong style="font-size:13px">${ct.name}</strong>
          ${ct.dept ? `<span style="font-size:11px;color:var(--text3)">${ct.dept}</span>` : ''}
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.9;padding-left:2px;">
          ${ct.job ? ct.job + '<br>' : ''}
          ${ct.phone ? '📞 ' + ct.phone + '<br>' : ''}
          ${ct.mail ? `<a href="mailto:${ct.mail}" style="color:var(--accent)">${ct.mail}</a>` : ''}
        </div>
      </div>`).join('');
  })();

  const displayName = [p.company, p.companyEn].filter(Boolean).join(' / ');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay open';
  overlay.id = 'overlay-viewpart-' + p.id;
  overlay.innerHTML = `
    <div class="modal" style="max-width:900px;">
      <div class="modal-head" style="border-radius:14px 14px 0 0;">
        <h2 style="font-size:15px">${displayName}</h2>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn btn-ghost btn-sm" onclick="closePartModal(${p.id});openEditPartner(${p.id})">✏️ 編輯資料</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:var(--red)" onclick="deletePartner(${p.id})">🗑 刪除</button>
          <button class="modal-close" onclick="closePartModal(${p.id})">✕</button>
        </div>
      </div>
      <div class="modal-body" style="padding:0;max-height:80vh;overflow-y:auto;">
        <div class="vd-wrap">
          <!-- LEFT: 窗口資訊 + 代理產品 + 聯繫人 -->
          <div class="vd-left">
            <div class="vd-company-head">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <h2 style="font-size:17px;font-weight:800;color:var(--text)">${p.company||p.companyEn||'-'}</h2>
                ${p.companyEn && p.company ? `<span style="font-size:12px;color:var(--text3)">${p.companyEn}</span>` : ''}
              </div>
              <div style="margin-top:6px;">
                <span class="tag">${p.category}</span>
              </div>
            </div>

            ${showBrandSection ? `
            <div class="vd-section">
              <div class="vd-section-title">代理產品/品牌</div>
              ${brandHtml}
            </div>` : ''}

            <div class="vd-section">
              <div class="vd-section-title">聯繫人</div>
              ${contactsHtml}
            </div>
          </div>

          <!-- RIGHT: 聯繫紀錄 -->
          <div class="vd-right" id="vd-part-logs-${p.id}">
            ${renderPartLogsPanel(p)}
          </div>
        </div>
      </div>
    </div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closePartModal(p.id); });
  document.body.appendChild(overlay);
}

function openPartLogForm(partId, logId) {
  const p = DB.partners.find(x => x.id === partId);
  if (!p) return;
  const existing = logId !== null ? p.logs.find(l => l.id === logId) : null;
  const today = new Date().toISOString().slice(0,10);
  const isEdit = !!existing;

  openModal('partLogModal', isEdit ? '編輯聯繫紀錄' : '新增聯繫紀錄', `
    <div class="form-grid">
      <div class="form-group"><label>日期</label>
        <input id="plf-date" class="form-control" type="date" value="${existing?.date||today}">
      </div>
      <div class="form-group"><label>聯繫方式</label>
        <select id="plf-method" class="form-control">
          ${['電話','LINE','MAIL','實體','視訊'].map(v=>`<option ${(existing?.method||'電話')===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group form-full"><label>聯繫內容</label>
        <textarea id="plf-content" class="form-control" rows="4" placeholder="記錄本次聯繫的重點內容…">${existing?.content||''}</textarea>
      </div>
    </div>
  `, () => {
    const content = document.getElementById('plf-content').value.trim();

      date: document.getElementById('plf-date').value,
      method: document.getElementById('plf-method').value,
      content,
    };
    if (isEdit) {

      if (idx >= 0) p.logs[idx] = logData;

}
